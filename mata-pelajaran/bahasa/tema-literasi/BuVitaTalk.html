<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BuVita Talk Demo</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #dff7ff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .card {
        width: 420px;
        background: white;
        border-radius: 20px;
        padding: 25px;
        text-align: center;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      }

      .owl {
        font-size: 80px;
      }

      h2 {
        color: #3a5f7d;
      }

      #question {
        font-size: 22px;
        margin: 20px 0;
        min-height: 60px;
      }

      #answer {
        background: #f4f4f4;
        padding: 12px;
        border-radius: 10px;
        min-height: 30px;
        margin-bottom: 20px;
      }

      button {
        padding: 15px 25px;
        font-size: 18px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        background: #4caf50;
        color: white;
      }

      button:hover {
        background: #388e3c;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="owl">🦉</div>

      <h2>BuVita Talk Demo</h2>

      <div id="question">Tekan tombol mulai.</div>

      <div id="answer">...</div>

      <button onclick="startConversation()">▶ Mulai</button>
    </div>

    <script>
      let step = 0;
      let studentName = "";

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      const recognition = new SpeechRecognition();

      recognition.lang = "id-ID";
      recognition.interimResults = false;

      function speak(text) {
        document.getElementById("question").innerHTML = text;

        const utter = new SpeechSynthesisUtterance(text);

        utter.lang = "id-ID";

        speechSynthesis.speak(utter);

        utter.onend = function () {
          recognition.start();
        };
      }

      function startConversation() {
        step = 1;

        speak("Halo. Siapa namamu?");
      }

      recognition.onresult = function (event) {
        let text = event.results[0][0].transcript.toLowerCase();

        document.getElementById("answer").innerHTML = text;

        if (step == 1) {
          studentName = text.replace("nama saya", "").replace("aku", "").replace("saya", "").trim();

          if (studentName == "") studentName = "Teman";

          step = 2;

          speak("Halo " + studentName + ". Senang bertemu denganmu. Hari ini kamu senang atau sedih?");
        } else if (step == 2) {
          if (text.includes("senang")) {
            speak("Alhamdulillah. Semoga harimu menyenangkan. Sampai jumpa.");
          } else if (text.includes("sedih")) {
            speak("Tidak apa apa. Semoga setelah belajar nanti kamu menjadi lebih semangat.");
          } else {
            speak("Terima kasih sudah menjawab. Sampai jumpa.");
          }

          step = 3;
        }
      };

      recognition.onerror = function () {
        document.getElementById("answer").innerHTML = "Mikrofon tidak mendengar suara.";
      };
    </script>
  </body>
</html>
