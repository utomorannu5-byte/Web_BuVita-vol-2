<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BuVita EduPlay: Trace Engine Pro Complete</title>
    <link rel="stylesheet" href="../../../style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@900&display=swap" rel="stylesheet" />
    <style>
      body {
        background-color: #0f0e13;
        display: flex;
        flex-direction: column;
        align-items: center;
        user-select: none;
        font-family: "Nunito", sans-serif;
        margin: 0;
        padding: 0;
      }
      .game-container {
        width: 100%;
        max-width: 850px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .game-header {
        background: linear-gradient(135deg, #6c5ce7, #a29bfe);
        color: white;
        padding: 15px 30px;
        border-radius: 20px;
        border: 4px solid #000;
        box-shadow: 6px 6px 0px #000;
        font-family: "Fredoka One", sans-serif;
        font-size: 1.8rem;
        margin-bottom: 20px;
        text-align: center;
        width: 100%;
      }

      .papan-tulis-container {
        background-color: #1c1b22;
        border: 4px solid #000;
        border-radius: 24px;
        padding: 20px;
        width: 100%;
        box-shadow: 6px 6px 0px #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        box-sizing: border-box;
      }

      #canvasTulis {
        background-color: #111014;
        border: 4px dashed #34495e;
        border-radius: 20px;
        cursor: crosshair;
        touch-action: none;
      }

      .panel-pilih-huruf-az {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        justify-content: center;
        margin-bottom: 20px;
        padding: 12px;
        background: #18171c;
        border-radius: 15px;
        width: 100%;
        box-sizing: border-box;
        border: 2px solid #2c2a38;
      }
      .btn-peta-huruf {
        width: 42px;
        height: 42px;
        background-color: #2c2a38;
        border: 2px solid #000;
        color: white;
        font-family: "Fredoka One", sans-serif;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 1.3rem;
        transition: 0.1s;
      }
      .btn-peta-huruf.active {
        background-color: #00ecc6;
        color: #000;
        border-color: #fff;
        transform: scale(1.15);
        box-shadow: 0px 3px 0px #000;
      }

      .popup-overlay-global {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        z-index: 9999;
        justify-content: center;
        align-items: center;
      }
      .popup-content-box {
        background-color: #1c1b22;
        border: 4px solid #2ecc71;
        border-radius: 24px;
        padding: 40px;
        text-align: center;
        max-width: 450px;
        width: 90%;
      }
      .popup-btn-next {
        background-color: #f1b811;
        color: #000;
        font-family: "Fredoka One", sans-serif;
        padding: 15px 30px;
        font-size: 1.3rem;
        border: 3px solid #000;
        border-radius: 15px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="game-container">

      <div class="panel-pilih-huruf-az" id="zonaTombolAz"></div>

      <div class="papan-tulis-container">
        <div style="color: #aaa; margin-bottom: 15px; font-weight: bold; text-align: center; font-size: 1.1rem">🎯 Hubungkan titik <span style="color: #2ecc71">HIJAU</span> melewati bintang ⭐ sesuai urutan alur panah!</div>
        <canvas id="canvasTulis" width="400" height="400"></canvas>
      </div>

      <div id="successPopup" class="popup-overlay-global">
        <div class="popup-content-box">
          <div style="font-size: 5rem; margin-bottom: 15px">🏆🤩</div>
          <h2 style="font-family: &quot;Fredoka One&quot;; color: #2ecc71; font-size: 2.2rem; margin-bottom: 10px">PERFECT WORK!</h2>
          <p style="color: white; font-size: 1.2rem; margin-bottom: 25px">Hebat! Kamu berhasil melatih fokus dan menulis huruf ini dengan rapi!</p>
          <button class="popup-btn-next" onclick="lanjutHurufOtomatis()">HURUF BERIKUTNYA ➡️</button>
        </div>
      </div>
    </div>

        ],
        w: [
          { x: 120, y: 170 },
          { x: 145, y: 270 },

          { x: 250, y: 270 },
          { x: 270, y: 170 },
        ],
        x: [
          { x: 140, y: 170 },
          { x: 250, y: 280 },
          { x: 250, y: 170 },
          { x: 140, y: 280 },
        ],
        y: [
          { x: 140, y: 170 },
          { x: 145, y: 240 },
          { x: 190, y: 280 },
          { x: 240, y: 240 },
          { x: 240, y: 170 },
          { x: 240, y: 310 },
          { x: 190, y: 350 },
          { x: 135, y: 330 },
        ],
        z: [
          { x: 150, y: 170 },
          { x: 250, y: 170 },
          { x: 150, y: 280 },
          { x: 250, y: 280 },
        ],
      };

      const alphabetList = Object.keys(engineDataHuruf);
      let activeIndex = 0;
      let currentLetter = alphabetList[activeIndex];

      const canvas = document.getElementById("canvasTulis");
      const ctx = canvas.getContext("2d");

      let checkpoints = [];
      let nextCheckpointIdx = 0;
      let isDrawing = false;
      let userPath = [];

      document.addEventListener("DOMContentLoaded", () => {
        initAlphabetMenu();
        loadEngineTracing();

        // Hybrid Control (Mouse & Touch Screen)
        canvas.addEventListener("mousedown", startTracing);
        canvas.addEventListener("mousemove", doTracing);
        canvas.addEventListener("mouseup", stopTracing);
        canvas.addEventListener("mouseleave", stopTracing);

        canvas.addEventListener("touchstart", (e) => {
          startTracing(e.touches[0]);
        });
        canvas.addEventListener("touchmove", (e) => {
          doTracing(e.touches[0]);
          e.preventDefault();
        });
        canvas.addEventListener("touchend", stopTracing);
      });

      function initAlphabetMenu() {
        const zona = document.getElementById("zonaTombolAz");
        zona.innerHTML = "";
        alphabetList.forEach((char, idx) => {
          const btn = document.createElement("button");
          btn.className = "btn-peta-huruf";
          btn.id = `btn-pro-${char}`;
          btn.innerText = char;
          btn.onclick = () => {
            if (!isDrawing) {
              activeIndex = idx;
              loadEngineTracing();
            }
          };
          zona.appendChild(btn);
        });
      }

      function loadEngineTracing() {
        currentLetter = alphabetList[activeIndex];
        document.querySelectorAll(".btn-peta-huruf").forEach((b) => b.classList.remove("active"));
        document.getElementById(`btn-pro-${currentLetter}`).classList.add("active");

        checkpoints = engineDataHuruf[currentLetter].map((p) => ({ ...p, cleared: false }));
        nextCheckpointIdx = 0;
        userPath = [];
        drawEngineFrame();
      }

      function drawEngineFrame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. BACKBONE GUIDE: Bidang Vektor Utama Huruf (Shadow Guide Lembut)
        ctx.beginPath();
        ctx.strokeStyle = "rgba(255, 255, 255, 0.04)";
        ctx.lineWidth = 42;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        checkpoints.forEach((pt, idx) => {
          if (idx === 0) ctx.moveTo(pt.x, pt.y);
          else ctx.lineTo(pt.x, pt.y);
        });
        ctx.stroke();

        // 2. USER TRACE PATH: Jejak Garis Neon Milik Siswa
        if (userPath.length > 0) {
          ctx.beginPath();
          ctx.strokeStyle = "#00ffcc"; // Neon Glow Cyan
          ctx.lineWidth = 20;
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          userPath.forEach((pt, idx) => {
            if (idx === 0) ctx.moveTo(pt.x, pt.y);
            else ctx.lineTo(pt.x, pt.y);
          });
          ctx.stroke();
        }

        // 3. DIRECTIONAL DYNAMIC ARROW (Hanya muncul jika misi belum kelar)
        if (nextCheckpointIdx < checkpoints.length) {
          let target = checkpoints[nextCheckpointIdx];
          let dari = nextCheckpointIdx === 0 ? checkpoints[0] : checkpoints[nextCheckpointIdx - 1];

          // Hitung derajat & render panah dinamis di tengah jalur sensor aktif
          drawDynamicArrow(dari.x, dari.y, target.x, target.y);

          // Render STARTING POINT NODE (Hijau Stabilo)
          ctx.beginPath();
          ctx.arc(checkpoints[0].x, checkpoints[0].y, 14, 0, Math.PI * 2);
          ctx.fillStyle = nextCheckpointIdx === 0 ? "#2ecc71" : "#e67e22";
          ctx.fill();
          ctx.lineWidth = 3;
          ctx.strokeStyle = "#fff";
          ctx.stroke();
        }

        // 4. CHECKPOINT MARKS: Gambar Bintang Sensor Target Jalan
        checkpoints.forEach((pt, idx) => {
          if (idx > 0 && !pt.cleared) {
            ctx.fillStyle = idx === nextCheckpointIdx ? "#f1c40f" : "#34495e";
            ctx.font = "16px sans-serif";
            ctx.fillText("⭐", pt.x - 7, pt.y + 6);
          }
        });
      }

      function drawDynamicArrow(fX, fY, tX, tY) {
        let angle = Math.atan2(tY - fY, tX - fX);
        let midX = (fX + tX) / 2;
        let midY = (fY + tY) / 2;

        ctx.save();
        ctx.translate(midX, midY);
        ctx.rotate(angle);
        ctx.fillStyle = "#f1c40f"; // Kuning Sempurna

        ctx.beginPath();
        ctx.moveTo(-15, -6);
        ctx.lineTo(3, -6);
        ctx.lineTo(3, -12);
        ctx.lineTo(18, 0);
        ctx.lineTo(3, 12);
        ctx.lineTo(3, 6);
        ctx.lineTo(-15, 6);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function startTracing(e) {
        let pos = getCanvasPos(e);
        let distToStart = Math.hypot(pos.x - checkpoints[0].x, pos.y - checkpoints[0].y);

        // Toleransi radius klik awal start node = 40px
        if (distToStart < 40) {
          isDrawing = true;
          userPath = [pos];
          if (nextCheckpointIdx === 0) nextCheckpointIdx = 1;
          drawEngineFrame();
        }
      }

      function doTracing(e) {
        if (!isDrawing) return;
        let pos = getCanvasPos(e);
        userPath.push(pos);

        if (nextCheckpointIdx < checkpoints.length) {
          let target = checkpoints[nextCheckpointIdx];
          let jarakKeSensor = Math.hypot(pos.x - target.x, pos.y - target.y);

          // Jika kursor masuk radius 35px, sensor berikutnya terbuka (Cleared!)
          if (jarakKeSensor < 35) {
            checkpoints[nextCheckpointIdx].cleared = true;
            nextCheckpointIdx++;

            if (nextCheckpointIdx === checkpoints.length) {
              isDrawing = false;
              document.getElementById("successPopup").style.display = "flex";
            }
          }
        }
        drawEngineFrame();
      }

      function stopTracing() {
        if (!isDrawing) return;
        isDrawing = false;

        // Jika dilepas paksa sebelum finish, auto-reset (Melatih konsistensi fokus siswa)
        if (nextCheckpointIdx < checkpoints.length) {
          loadEngineTracing();
        }
      }

      function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (e.clientX - rect.left) * (canvas.width / rect.width),
          y: (e.clientY - rect.top) * (canvas.height / rect.height),
        };
      }

      function lanjutHurufOtomatis() {
        document.getElementById("successPopup").style.display = "none";
        activeIndex = (activeIndex + 1) % alphabetList.length;
        loadEngineTracing();
      }
    </script>

</html>
