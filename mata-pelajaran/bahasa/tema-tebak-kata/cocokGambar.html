<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BuVita EduPlay: Belajar Cocok Gambar</title>
    <link rel="stylesheet" href="../../../style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
      body {
        background-color: #121214;
        background-image: radial-gradient(#252529 15%, transparent 16%);
        background-size: 20px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .game-container {
        width: 100%;
        max-width: 900px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .game-header {
        background: linear-gradient(135deg, #3498db, #2980b9);
        color: white;
        padding: 15px 30px;
        border-radius: 20px;
        border: 4px solid black;
        box-shadow: 6px 6px 0px black;
        font-family: "Fredoka One", sans-serif;
        font-size: 1.8rem;
        margin-bottom: 25px;
        text-align: center;
        width: 100%;
        cursor: pointer;
      }

      /* Papan Utama Permainan */
      .papan-main-visual {
        background-color: #1c1b22;
        border: 4px solid black;
        border-radius: 24px;
        padding: 30px 20px;
        width: 100%;
        box-shadow: 6px 6px 0px black;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 25px;
      }

      /* Box Gambar Contoh Panduan (Atas) */
      .box-target-contoh {
        background-color: #2c2a38;
        border: 4px solid #f1c40f;
        border-radius: 20px;
        padding: 25px;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 35px;
        box-shadow: inset 0px 4px 8px rgba(0, 0, 0, 0.5);
        width: 85%;
        max-width: 320px;
      }
      .emoji-target-besar {
        font-size: 6.5rem;
        filter: drop-shadow(0px 6px 0px rgba(0, 0, 0, 0.3));
        animation: pulseSkala 2s infinite alternate;
      }

      .instruksi-suara-label {
        font-family: "Nunito", sans-serif;
        font-weight: 900;
        color: #aaa;
        margin-bottom: 25px;
        text-align: center;
        font-size: 1.2rem;
      }

      /* Wadah Pilihan Gambar (Bawah) - Horizontal & Besar */
      .wadah-pilihan-gambar {
        display: flex;
        gap: 20px;
        justify-content: center;
        flex-wrap: wrap;
        width: 100%;
        padding-top: 25px;
        border-top: 3px dashed #333;
      }

      .btn-kartu-gambar {
        width: 120px;
        height: 120px;
        background-color: #2c2a38;
        border: 4px solid black;
        border-radius: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 4.5rem;
        cursor: pointer;
        box-shadow: 0px 6px 0px black;
        transition: 0.1s;
      }
      .btn-kartu-gambar:active {
        transform: translateY(4px);
        box-shadow: 0px 2px 0px black;
      }

      @keyframes pulseSkala {
        from {
          transform: scale(1);
        }
        to {
          transform: scale(1.06);
        }
      }

      /* Popup Sukses Global */
      .popup-overlay-global {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        z-index: 9999;
        justify-content: center;
        align-items: center;
      }
      .popup-content-box {
        background-color: #1c1b22;
        border: 4px solid #2ecc71;
        border-radius: 24px;
        padding: 40px;
        text-align: center;
        max-width: 450px;
        width: 90%;
      }
      .popup-btn-next {
        background-color: #f1b811;
        color: black;
        font-family: "Fredoka One", sans-serif;
        padding: 15px 30px;
        font-size: 1.3rem;
        border: 3px solid black;
        border-radius: 15px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header class="main-header" style="width: 100%">
      <div class="logo-area">
        <img src="../../../assets/LogoFull.png" class="logo-icon" alt="BuVita Logo" />
        <span class="logo-text"><span class="text-white">BuVita</span> <span class="text-yellow">EduPlay</span></span>
      </div>
      <nav class="nav-menu">
        <a href="../../../index.html" class="nav-item">HOME</a>
        <a href="../../../games.html" class="nav-item active">GAMES</a>
        <a href="../../../kategori.html" class="nav-item">KATEGORI</a>
        <a href="../../../aboutUs.html" class="nav-item">TENTANG KAMI</a>
      </nav>
    </header>

    <div class="game-container">
      <div class="game-header" id="btnSuara" onclick="putarSuaraMisi()">🌟 Game Cocok Gambar Cerdas 🔊</div>

      <div class="papan-main-visual">
        <div class="box-target-contoh">
          <div class="emoji-target-besar" id="gambarTargetAtas">🍎</div>
        </div>

        <div class="instruksi-suara-label">👉 Cari dan pencet gambar di bawah yang SAMA PERSIS! 👈</div>

        <div class="wadah-pilihan-gambar" id="zonaTombolPilihan"></div>
      </div>

      <div class="navigasi-level-box">
        <button class="btn-nav-level btn-back" onclick="window.location.href = '../../../games.html'">⬅️ KELUAR</button>
        <button class="btn-nav-level btn-next" onclick="muatSoalCocokGambar()">ACAK BARU 🔄</button>
      </div>

      <div id="successPopup" class="popup-overlay-global">
        <div class="popup-content-box">
          <div style="font-size: 5.5rem; margin-bottom: 15px">🎉🤩</div>
          <h2 style="font-family: &quot;Fredoka One&quot;; color: #2ecc71; font-size: 2.3rem; margin-bottom: 10px">HEBAT BENAR!</h2>
          <p style="font-family: &quot;Nunito&quot;; color: white; font-size: 1.3rem; margin-bottom: 25px">Gambarnya sama kembar! Kamu pintar sekali!</p>
          <button class="popup-btn-next" onclick="tutupDanLanjutSoal()">MAIN LAGI ➡️</button>
        </div>
      </div>
    </div>

    <script>
      // Database Soal Khusus Gambar Objek Sehari-hari (Tanpa Elemen Huruf)
      const databaseCocokGambar = [
        { benar: "🍎", opsi: ["🍎", "🐶", "🚗"], audio: "../../../audio/cocok_apel.mp3" },
        { benar: "⚽", opsi: ["🐱", "⚽", "🍦"], audio: "../../../audio/cocok_bola.mp3" },
        { benar: "🧼", opsi: ["🧼", "🍌", "🏠"], audio: "../../../audio/cocok_sabun.mp3" },
        { benar: "🐱", opsi: ["🚗", "🎒", "🐱"], audio: "../../../audio/cocok_kucing.mp3" },
        { benar: "🎒", opsi: ["🎒", "🍎", "⚽"], audio: "../../../audio/cocok_tas.mp3" },
        { benar: "🚌", opsi: ["🍦", "🚌", "🧼"], audio: "../../../audio/cocok_bus.mp3" },
      ];

      let indeksSoal = 0;
      let soalKini = null;

      function muatSoalCocokGambar() {
        // Ambil data gambar acak
        const acak = Math.floor(Math.random() * databaseCocokGambar.length);
        soalKini = databaseCocokGambar[acak];

        // Tampilkan gambar target di atas
        document.getElementById("gambarTargetAtas").innerText = soalKini.benar;

        // Render Tombol Pilihan Gambar di Bawah (diacak urutannya)
        const zonaPilihan = document.getElementById("zonaTombolPilihan");
        zonaPilihan.innerHTML = "";

        let opsiAcak = [...soalKini.opsi].sort(() => Math.random() - 0.5);

        opsiAcak.forEach((emojiItem) => {
          const kartu = document.createElement("div");
          kartu.className = "btn-kartu-gambar";
          kartu.innerText = emojiItem;

          // Aksi klik verifikasi langsung
          kartu.onclick = () => verifikasiGambarSama(emojiItem);
          zonaPilihan.appendChild(kartu);
        });

        putarSuaraMisi();
      }

      function verifikasiGambarSama(emojiTerpilih) {
        if (emojiTerpilih === soalKini.benar) {
          new Audio("../../../audio/benar.mp3").play().catch(() => {});

          // Tampilkan popup selamat sukses gembira
          setTimeout(() => {
            new Audio("../../../audio/menang.mp3").play().catch(() => {});
            document.getElementById("successPopup").style.display = "flex";
          }, 200);
        } else {
          new Audio("../../../audio/salah.mp3").play().catch(() => {});
          alert("❌ Wah, gambarnya belum sama kembar. Yuk cari yang bentuknya mirip!");
        }
      }

      function putarSuaraMisi() {
        if (soalKini && soalKini.audio) {
          new Audio(soalKini.audio).play().catch(() => {});
        }
      }

      function tutupDanLanjutSoal() {
        document.getElementById("successPopup").style.display = "none";
        muatSoalCocokGambar();
      }

      // Jalankan otomatis saat web siap dibuka
      document.addEventListener("DOMContentLoaded", () => {
        muatSoalCocokGambar();
      });
    </script>
  </body>
</html>
