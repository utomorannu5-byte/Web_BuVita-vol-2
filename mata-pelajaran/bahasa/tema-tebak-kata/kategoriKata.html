<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Bahasa Indonesia: Kategori Kata - BuVita EduPlay</title>
    <link rel="stylesheet" href="../../../style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
      body {
        background-color: #121214;
        background-image: radial-gradient(#252529 15%, transparent 16%);
        background-size: 20px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .game-container {
        width: 100%;
        max-width: 900px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .bahasa-header {
        background: linear-gradient(135deg, #2ecc71, #27ae60);
        color: white;
        padding: 15px 30px;
        border-radius: 20px;
        border: 4px solid black;
        box-shadow: 6px 6px 0px black;
        font-family: "Fredoka One", sans-serif;
        font-size: 1.8rem;
        margin-bottom: 20px;
        text-align: center;
        width: 100%;
        cursor: pointer;
      }

      .level-selector-zone {
        display: flex;
        gap: 15px;
        margin-bottom: 25px;
        width: 100%;
      }
      .btn-level-pilih {
        flex: 1;
        font-family: "Fredoka One", sans-serif;
        padding: 12px;
        border: 3px solid black;
        border-radius: 12px;
        cursor: pointer;
        color: white;
        box-shadow: 4px 4px 0px black;
        font-size: 1.1rem;
        transition: 0.1s;
        text-align: center;
      }
      .btn-level-pilih.active {
        transform: translateY(4px);
        box-shadow: 0px 0px 0px black;
        border-color: white;
      }

      /* Area Utama Permainan */
      .papan-main-sorting {
        background-color: #1c1b22;
        border: 4px solid black;
        border-radius: 24px;
        padding: 30px 20px;
        width: 100%;
        box-shadow: 6px 6px 0px black;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 25px;
        position: relative;
      }

      /* Item Berjalan / Muncul di Tengah */
      .kartu-item-tengah {
        background-color: #2c2a38;
        border: 4px solid #f1c40f;
        border-radius: 20px;
        padding: 25px;
        width: 85%;
        max-width: 400px;
        text-align: center;
        box-shadow: 0px 8px 0px black;
        margin-bottom: 35px;
        animation: popItem 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .emoji-item {
        font-size: 5rem;
        margin-bottom: 10px;
      }
      .teks-item {
        font-family: "Fredoka One", sans-serif;
        color: white;
        font-size: 1.8rem;
        letter-spacing: 1px;
      }

      /* Pembagian Dua Keranjang Kiri & Kanan */
      .zona-dua-keranjang {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        width: 100%;
      }
      .box-keranjang {
        border: 4px solid black;
        border-radius: 18px;
        padding: 20px 10px;
        text-align: center;
        color: white;
        box-shadow: 5px 5px 0px black;
        cursor: pointer;
        transition: 0.1s;
      }
      .box-keranjang:active {
        transform: scale(0.98);
      }
      .title-keranjang {
        font-family: "Fredoka One", sans-serif;
        font-size: 1.4rem;
        margin-bottom: 5px;
      }
      .sub-keranjang {
        font-family: "Nunito", sans-serif;
        font-weight: bold;
        font-size: 0.9rem;
        opacity: 0.8;
      }

      /* Tombol Kontrol khusus Tablet/Mobile Touch */
      .touch-control-bar {
        display: flex;
        justify-content: space-between;
        width: 100%;
        gap: 20px;
        margin-bottom: 20px;
      }
      .btn-pilih-sisi {
        flex: 1;
        padding: 15px;
        font-family: "Fredoka One", sans-serif;
        font-size: 1.2rem;
        border: 3px solid black;
        border-radius: 15px;
        cursor: pointer;
        color: white;
        box-shadow: 4px 4px 0px black;
      }

      @keyframes popItem {
        from {
          transform: scale(0.7);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .popup-overlay-global {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        z-index: 9999;
        justify-content: center;
        align-items: center;
      }
      .popup-content-box {
        background-color: #1c1b22;
        border: 4px solid #2ecc71;
        border-radius: 24px;
        padding: 40px;
        text-align: center;
        max-width: 450px;
        width: 90%;
      }
      .popup-btn-next {
        background-color: #f1b811;
        color: black;
        font-family: "Fredoka One", sans-serif;
        padding: 15px 30px;
        font-size: 1.3rem;
        border: 3px solid black;
        border-radius: 15px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header class="main-header" style="width: 100%">
      <div class="logo-area">
        <img src="../../../assets/LogoFull.png" class="logo-icon" alt="BuVita Logo" />
        <span class="logo-text"><span class="text-white">BuVita</span> <span class="text-yellow">EduPlay</span></span>
      </div>
      <nav class="nav-menu">
        <a href="../../../index.html" class="nav-item">HOME</a>
        <a href="../../../games.html" class="nav-item active">GAMES</a>
        <a href="../../../kategori.html" class="nav-item">KATEGORI</a>
        <a href="../../../aboutUs.html" class="nav-item">TENTANG KAMI</a>
      </nav>
    </header>

    <div class="game-container">
      <div class="bahasa-header" id="btnSuara" onclick="putarSuaraMisi()">🧺 Game Memilah Kategori Kata 🔊</div>

      <div class="level-selector-zone">
        <button class="btn-level-pilih id-dasar active" style="background-color: #2ecc71" onclick="gantiLevelSorting('dasar')">
          🟢 LEVEL DASAR<br /><span style="font-size: 0.75rem; font-family: &quot;Nunito&quot;; font-weight: bold">(1 Kata Benda)</span>
        </button>
        <button class="btn-level-pilih id-menengah" style="background-color: #f1c40f; color: black" onclick="gantiLevelSorting('menengah')">
          🟡 MENENGAH<br /><span style="font-size: 0.75rem; font-family: &quot;Nunito&quot;; font-weight: bold">(2 Kata Sifat)</span>
        </button>
        <button class="btn-level-pilih id-lanjutan" style="background-color: #e74c3c" onclick="gantiLevelSorting('lanjutan')">
          🔴 LANJUTAN<br /><span style="font-size: 0.75rem; font-family: &quot;Nunito&quot;; font-weight: bold">(3 Kata Kalimat)</span>
        </button>
      </div>

      <div class="papan-main-sorting">
        <p style="font-family: &quot;Nunito&quot;; font-weight: 900; color: #aaa; margin-bottom: 15px; text-align: center">Pilah benda/kalimat di bawah ini masuk ke kelompok mana?</p>

        <div class="kartu-item-tengah">
          <div class="emoji-item" id="soalEmoji">🍎</div>
          <div class="teks-item" id="soalTeks">APEL</div>
        </div>

        <div class="touch-control-bar">
          <button class="btn-pilih-sisi" style="background-color: #34495e" onclick="pilihSisiKeranjang('kiri')">⬅️ MASUK KIRI</button>
          <button class="btn-pilih-sisi" style="background-color: #34495e" onclick="pilihSisiKeranjang('kanan')">MASUK KANAN ➡️</button>
        </div>

        <div class="zona-dua-keranjang">
          <div class="box-keranjang" id="keranjangKiri" style="background-color: #e67e22" onclick="pilihSisiKeranjang('kiri')">
            <div class="title-keranjang" id="namaKiri">MAKANAN 🍔</div>
            <div class="sub-keranjang">Klik / Pilih Kiri</div>
          </div>
          <div class="box-keranjang" id="keranjangKanan" style="background-color: #9b59b6" onclick="pilihSisiKeranjang('kanan')">
            <div class="title-keranjang" id="namaKanan">HEWAN 🐶</div>
            <div class="sub-keranjang">Klik / Pilih Kanan</div>
          </div>
        </div>
      </div>

      <div class="navigasi-level-box">
        <button class="btn-nav-level btn-back" onclick="window.location.href = 'MenyusunKata.html'">⬅️ KEMBALI</button>
        <button class="btn-nav-level btn-next" onclick="window.location.href = 'EkspresiBuVita.html'">GAME 3 ➡️</button>
      </div>

      <div id="successPopup" class="popup-overlay-global">
        <div class="popup-content-box">
          <div style="font-size: 5rem; margin-bottom: 15px">🎉</div>
          <h2 style="font-family: &quot;Fredoka One&quot;; color: #2ecc71; font-size: 2.3rem; margin-bottom: 10px">LALU BIASA TEPAT!</h2>
          <p id="popupMessage" style="font-family: &quot;Nunito&quot;; color: white; font-size: 1.2rem; margin-bottom: 25px"></p>
          <button class="popup-btn-next" onclick="tutupDanLanjutSoal()">BENDA BERIKUTNYA 🌟</button>
        </div>
      </div>
    </div>

    <script>
      // Database Soal Kategori dengan Aturan Struktur Kosakata
      const databaseSorting = {
        dasar: {
          kiri: { nama: "MAKANAN 🍔", kode: "makanan" },
          kanan: { nama: "HEWAN 🐶", kode: "hewan" },
          soal: [
            { teks: "PISANG", emoji: "🍌", kunci: "makanan", audio: "../../../audio/sort_pisang.mp3" },
            { teks: "KUCING", emoji: "🐱", kunci: "hewan", audio: "../../../audio/sort_kucing.mp3" },
            { teks: "DONAT", emoji: "🍩", kunci: "makanan", audio: "../../../audio/sort_donat.mp3" },
            { teks: "GAJAH", emoji: "🐘", kunci: "hewan", audio: "../../../audio/sort_gajah.mp3" },
          ],
        },
        menengah: {
          kiri: { nama: "BENDA BERSIH ✨", kode: "bersih" },
          kanan: { nama: "BENDA KOTOR 🧹", kode: "kotor" },
          soal: [
            { teks: "BAJU BERSIH", emoji: "👕", kunci: "bersih", audio: "../../../audio/sort_bajubersih.mp3" },
            { teks: "SEPATU LUMPUR", emoji: "👟", kunci: "kotor", audio: "../../../audio/sort_sepatulumpur.mp3" },
            { teks: "PIRING KILAP", emoji: "🍽️", kunci: "bersih", audio: "../../../audio/sort_piringkilap.mp3" },
            { teks: "SAMPAH PLASTIK", emoji: "🗑️", kunci: "kotor", audio: "../../../audio/sort_sampah.mp3" },
          ],
        },
        lanjutan: {
          kiri: { nama: "DI SEKOLAH 🏫", kode: "sekolah" },
          kanan: { nama: "DI RUMAH 🏠", kode: "rumah" },
          soal: [
            { teks: "ADIK BACA BUKU", emoji: "📖", kunci: "sekolah", audio: "../../../audio/sort_adikbaca.mp3" },
            { teks: "IBU MASAK NASI", emoji: "🍳", kunci: "rumah", audio: "../../../audio/sort_ibumasak.mp3" },
            { teks: "GURU TULIS PAPAN", emoji: "👩‍🏫", kunci: "sekolah", audio: "../../../audio/sort_gurutulis.mp3" },
            { teks: "SAYA TIDUR SIANG", emoji: "🛏️", kunci: "rumah", audio: "../../../audio/sort_sayatidur.mp3" },
          ],
        },
      };

      let levelAktif = "dasar";
      let indeksSoal = 0;
      let dataLevelKini = null;
      let soalKini = null;

      function gantiLevelSorting(levelBaru) {
        levelAktif = levelBaru;
        document.querySelectorAll(".btn-level-pilih").forEach((b) => b.classList.remove("active"));
        document.querySelector(`.id-${levelBaru}`).classList.add("active");

        indeksSoal = 0;
        muatSoalSorting();
      }

      function muatSoalSorting() {
        dataLevelKini = databaseSorting[levelAktif];

        // Atur label teks nama keranjang
        document.getElementById("namaKiri").innerText = dataLevelKini.kiri.nama;
        document.getElementById("namaKanan").innerText = dataLevelKini.kanan.nama;

        // Ambil soal secara berurutan / acak
        soalKini = dataLevelKini.soal[indeksSoal % dataLevelKini.soal.length];

        document.getElementById("soalEmoji").innerText = soalKini.emoji;
        document.getElementById("soalTeks").innerText = soalKini.teks;

        putarSuaraMisi();
      }

      function pilihSisiKeranjang(sisi) {
        let kodeKategoriTerpilih = sisi === "kiri" ? dataLevelKini.kiri.kode : dataLevelKini.kanan.kode;

        if (kodeKategoriTerpilih === soalKini.kunci) {
          new Audio("../../../audio/benar.mp3").play().catch(() => {});

          let namaKeranjangTujuan = sisi === "kiri" ? dataLevelKini.kiri.nama : dataLevelKini.kanan.nama;
          document.getElementById("popupMessage").innerHTML = `Hebat! <b>${soalKini.teks}</b> Memang Kelompok Dari <b>${namaKeranjangTujuan}</b>!`;
          document.getElementById("successPopup").style.display = "flex";
        } else {
          new Audio("../../../audio/salah.mp3").play().catch(() => {});
          alert("❌ Hmm, sepertinya kurang cocok dimasukkan ke keranjang itu. Yuk coba keranjang yang satunya!");
        }
      }

      function putarSuaraMisi() {
        if (soalKini && soalKini.audio) {
          new Audio(soalKini.audio).play().catch(() => {});
        }
      }

      function tutupDanLanjutSoal() {
        document.getElementById("successPopup").style.display = "none";
        indeksSoal++;
        muatSoalSorting();
      }

      document.addEventListener("DOMContentLoaded", () => {
        muatSoalSorting();
      });
    </script>
  </body>
</html>
