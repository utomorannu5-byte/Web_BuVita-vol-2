<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Bahasa Indonesia: Detektif Bahasa - BuVita EduPlay</title>
    <link rel="stylesheet" href="../../../style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
      body {
        background-color: #121214;
        background-image: radial-gradient(#252529 15%, transparent 16%);
        background-size: 20px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .game-container {
        width: 100%;
        max-width: 900px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .detektif-header {
        background: linear-gradient(135deg, #9b59b6, #8e44ad);
        color: white;
        padding: 15px 30px;
        border-radius: 20px;
        border: 4px solid black;
        box-shadow: 6px 6px 0px black;
        font-family: "Fredoka One", sans-serif;
        font-size: 1.8rem;
        margin-bottom: 20px;
        text-align: center;
        width: 100%;
        cursor: pointer;
      }

      .level-selector-zone {
        display: flex;
        gap: 15px;
        margin-bottom: 25px;
        width: 100%;
      }
      .btn-level-pilih {
        flex: 1;
        font-family: "Fredoka One", sans-serif;
        padding: 12px;
        border: 3px solid black;
        border-radius: 12px;
        cursor: pointer;
        color: white;
        box-shadow: 4px 4px 0px black;
        font-size: 1.1rem;
        transition: 0.1s;
        text-align: center;
      }
      .btn-level-pilih.active {
        transform: translateY(4px);
        box-shadow: 0px 0px 0px black;
        border-color: white;
      }

      /* Area Utama TKP Detektif */
      .papan-tkp-detektif {
        background-color: #1c1b22;
        border: 4px solid black;
        border-radius: 24px;
        padding: 25px;
        width: 100%;
        box-shadow: 6px 6px 0px black;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 25px;
      }

      /* Kertas Petunjuk Misteri */
      .kertas-memo-petunjuk {
        background-color: #f1c40f;
        color: #111;
        border: 3px solid black;
        border-radius: 12px;
        padding: 15px 25px;
        width: 90%;
        text-align: center;
        box-shadow: 4px 4px 0px black;
        margin-bottom: 25px;
        font-family: "Nunito", sans-serif;
        font-weight: 900;
      }
      .teks-misteri {
        font-family: "Fredoka One", sans-serif;
        font-size: 1.8rem;
        color: #c0392b;
        margin-top: 5px;
        display: block;
        letter-spacing: 1px;
      }

      /* Kanvas Tempat Kejadian Perkara (TKP Objek) */
      .papan-visual-tkp {
        width: 100%;
        max-width: 500px;
        height: 320px;
        background-color: #2c2a38;
        border: 4px solid black;
        border-radius: 20px;
        position: relative;
        overflow: hidden;
        box-shadow: inset 0px 4px 10px rgba(0, 0, 0, 0.5);
      }

      /* Elemen Objek yang Bisa Diklik di Dalam Gambar */
      .objek-tkp-item {
        position: absolute;
        font-size: 3.5rem;
        cursor: pointer;
        user-select: none;
        transition: transform 0.1s;
        filter: drop-shadow(0px 4px 0px rgba(0, 0, 0, 0.3));
      }
      .objek-tkp-item:active {
        transform: scale(1.2);
      }

      .popup-overlay-global {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        z-index: 9999;
        justify-content: center;
        align-items: center;
      }
      .popup-content-box {
        background-color: #1c1b22;
        border: 4px solid #2ecc71;
        border-radius: 24px;
        padding: 40px;
        text-align: center;
        max-width: 450px;
        width: 90%;
      }
      .popup-btn-next {
        background-color: #f1b811;
        color: black;
        font-family: "Fredoka One", sans-serif;
        padding: 15px 30px;
        font-size: 1.3rem;
        border: 3px solid black;
        border-radius: 15px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header class="main-header" style="width: 100%">
      <div class="logo-area">
        <img src="../../../assets/LogoFull.png" class="logo-icon" alt="BuVita Logo" />
        <span class="logo-text"><span class="text-white">BuVita</span> <span class="text-yellow">EduPlay</span></span>
      </div>
      <nav class="nav-menu">
        <a href="../../../index.html" class="nav-item">HOME</a>
        <a href="../../../games.html" class="nav-item active">GAMES</a>
        <a href="../../../kategori.html" class="nav-item">KATEGORI</a>
        <a href="../../../aboutUs.html" class="nav-item">TENTANG KAMI</a>
      </nav>
    </header>

    <div class="game-container">
      <div class="detektif-header" id="btnSuara" onclick="putarSuaraMisi()">🔍 Detektif Bahasa: Cari Objek Misteri 🔊</div>

      <div class="level-selector-zone">
        <button class="btn-level-pilih id-dasar active" style="background-color: #2ecc71" onclick="gantiLevelDetektif('dasar')">
          🟢 LEVEL DASAR<br /><span style="font-size: 0.75rem; font-family: &quot;Nunito&quot;; font-weight: bold">(1 Kata Benda)</span>
        </button>
        <button class="btn-level-pilih id-menengah" style="background-color: #f1c40f; color: black" onclick="gantiLevelDetektif('menengah')">
          🟡 MENENGAH<br /><span style="font-size: 0.75rem; font-family: &quot;Nunito&quot;; font-weight: bold">(2 Kata Deskripsi)</span>
        </button>
        <button class="btn-level-pilih id-lanjutan" style="background-color: #e74c3c" onclick="gantiLevelDetektif('lanjutan')">
          🔴 LANJUTAN<br /><span style="font-size: 0.75rem; font-family: &quot;Nunito&quot;; font-weight: bold">(3 Kata Aksi)</span>
        </button>
      </div>

      <div class="papan-tkp-detektif">
        <div class="kertas-memo-petunjuk">
          <span style="font-size: 1rem; letter-spacing: 1px">🕵️‍♂️ PETUNJUK RAHASIA DETEKTIF:</span>
          <span class="teks-misteri" id="teksClueMisteri">BOLA</span>
        </div>

        <div class="papan-visual-tkp" id="ruangGambarTKP"></div>
      </div>

      <div class="navigasi-level-box">
        <button class="btn-nav-level btn-back" onclick="window.location.href = 'KategoriKata.html'">⬅️ KEMBALI</button>
        <button class="btn-nav-level btn-next" onclick="muatMisiDetektif()">ACAK ULANG 🔄</button>
      </div>

      <div id="successPopup" class="popup-overlay-global">
        <div class="popup-content-box">
          <div style="font-size: 5rem; margin-bottom: 15px">🔍✨</div>
          <h2 style="font-family: &quot;Fredoka One&quot;; color: #2ecc71; font-size: 2.1rem; margin-bottom: 10px">KASUS TERPECAHKAN!</h2>
          <p id="popupMessage" style="font-family: &quot;Nunito&quot;; color: white; font-size: 1.2rem; margin-bottom: 25px"></p>
          <button class="popup-btn-next" onclick="tutupDanLanjutSoal()">CARI MISTERI BARU ➡️</button>
        </div>
      </div>
    </div>

    <script>
      // Database Soal Detektif Berdasarkan Aturan 1 Kata, 2 Kata, dan 3 Kata Kalimat
      const databaseDetektif = {
        dasar: [
          {
            clueTeks: "BOLA",
            kunciID: "target-bola",
            audio: "../../../audio/detektif_bola.mp3",
            itemLain: [
              { id: "target-bola", emoji: "⚽", top: "120px", left: "220px" },
              { id: "hiasan1", emoji: "🌳", top: "40px", left: "40px" },
              { id: "hiasan2", emoji: "🏠", top: "30px", left: "360px" },
              { id: "hiasan3", emoji: "🐱", top: "220px", left: "80px" },
            ],
          },
          {
            clueTeks: "MOBIL",
            kunciID: "target-mobil",
            audio: "../../../audio/detektif_mobil.mp3",
            itemLain: [
              { id: "target-mobil", emoji: "🚗", top: "200px", left: "320px" },
              { id: "hiasan1", emoji: "🌻", top: "140px", left: "5px" },
              { id: "hiasan2", emoji: "🎒", top: "80px", left: "150px" },
              { id: "hiasan3", emoji: "⏰", top: "40px", left: "280px" },
            ],
          },
        ],
        menengah: [
          {
            clueTeks: "TOPI MERAH",
            kunciID: "target-topimerah",
            audio: "../../../audio/detektif_topimerah.mp3",
            itemLain: [
              { id: "target-topimerah", emoji: "🧢", top: "80px", left: "200px" }, // Note: Pada HP aslinya disesuaikan warna visual
              { id: "salah1", emoji: "👒", top: "180px", left: "70px" }, // Topi cokelat
              { id: "salah2", emoji: "👑", top: "50px", left: "380px" }, // Mahkota
              { id: "hiasan1", emoji: "🧸", top: "210px", left: "290px" },
            ],
          },
        ],
        lanjutan: [
          {
            clueTeks: "BURUNG SEDANG TERBANG",
            kunciID: "target-burungterbang",
            audio: "../../../audio/detektif_burung.mp3",
            itemLain: [
              { id: "target-burungterbang", emoji: "🦅", top: "40px", left: "120px" }, // Terbang di atas
              { id: "salah1", emoji: "🐣", top: "240px", left: "380px" }, // Burung menetas di tanah
              { id: "hiasan1", emoji: "🌳", top: "110px", left: "300px" },
              { id: "hiasan2", emoji: "🚲", top: "200px", left: "40px" },
            ],
          },
        ],
      };

      let levelAktif = "dasar";
      let indeksMisi = 0;
      let misiKini = null;

      function gantiLevelDetektif(levelBaru) {
        levelAktif = levelBaru;
        document.querySelectorAll(".btn-level-pilih").forEach((b) => b.classList.remove("active"));
        document.querySelector(`.id-${levelBaru}`).classList.add("active");

        indeksMisi = 0;
        muatMisiDetektif();
      }

      function muatMisiDetektif() {
        const koleksiMisi = databaseDetektif[levelAktif];
        misiKini = koleksiMisi[indeksMisi % koleksiMisi.length];

        // Tampilkan Teks Clue Misteri kata di papan memo
        document.getElementById("teksClueMisteri").innerText = misiKini.clueTeks;

        // Render Seluruh Objek ke dalam TKP
        const ruangTKP = document.getElementById("ruangGambarTKP");
        ruangTKP.innerHTML = "";

        misiKini.itemLain.forEach((obj) => {
          const spanObj = document.createElement("div");
          spanObj.className = "objek-tkp-item";
          spanObj.id = obj.id;
          spanObj.innerText = obj.emoji;
          spanObj.style.top = obj.top;
          spanObj.style.left = obj.left;

          // Sistem Klik Analisis Detektif
          spanObj.onclick = () => verifikasiAnalisisDetektif(obj.id);
          ruangTKP.appendChild(spanObj);
        });

        putarSuaraMisi();
      }

      function verifikasiAnalisisDetektif(idTerpilih) {
        if (idTerpilih === misiKini.kunciID) {
          new Audio("../../../audio/menang.mp3").play().catch(() => {});
          document.getElementById("popupMessage").innerHTML = `Selamat Detektif! Kamu berhasil menemukan objek yang cocok dengan petunjuk:<br><b style="color:#f1c40f; font-size:1.8rem;">"${misiKini.clueTeks}"</b> 🌟`;
          document.getElementById("successPopup").style.display = "flex";
        } else {
          new Audio("../../../audio/salah.mp3").play().catch(() => {});
          alert("🕵️‍♂️ Panggilan Detektif: Objek itu kurang cocok dengan petunjuk rahasia. Ayo amati TKP lebih jeli lagi!");
        }
      }

      function putarSuaraMisi() {
        if (misiKini && misiKini.audio) {
          new Audio(misiKini.audio).play().catch(() => {});
        }
      }

      function tutupDanLanjutSoal() {
        document.getElementById("successPopup").style.display = "none";
        indeksMisi++;
        muatMisiDetektif();
      }

      document.addEventListener("DOMContentLoaded", () => {
        muatMisiDetektif();
      });
    </script>
  </body>
</html>
