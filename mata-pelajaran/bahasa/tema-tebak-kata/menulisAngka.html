<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BuVita EduPlay: Trace Engine Angka Pro</title>
    <link rel="stylesheet" href="../../../style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
      body {
        background-color: #121214;
        background-image: radial-gradient(#252529 15%, transparent 16%);
        background-size: 20px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        user-select: none;
        font-family: "Nunito", sans-serif;
        margin: 0;
        padding: 0;
      }
      .game-container {
        width: 100%;
        max-width: 900px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-sizing: border-box;
      }

      .game-header {
        background: linear-gradient(135deg, #ff7675, #6c5ce7);
        color: white;
        padding: 15px 30px;
        border-radius: 20px;
        border: 4px solid #000;
        box-shadow: 6px 6px 0px #000;
        font-family: "Fredoka One", sans-serif;
        font-size: 1.8rem;
        margin-bottom: 20px;
        text-align: center;
        width: 100%;
        box-sizing: border-box;
      }

      .papan-tulis-container {
        background-color: #1c1b22;
        border: 4px solid #000;
        border-radius: 24px;
        padding: 20px;
        width: 100%;
        box-shadow: 6px 6px 0px #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        box-sizing: border-box;
        margin-bottom: 25px;
      }

      #canvasTulis {
        background-color: #111014;
        border: 4px dashed #34495e;
        border-radius: 20px;
        cursor: crosshair;
        touch-action: none;
        box-shadow: inset 0px 4px 10px rgba(0, 0, 0, 0.7);
      }

      .panel-pilih-angka {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
        margin-bottom: 20px;
        padding: 12px;
        background: #18171c;
        border-radius: 15px;
        width: 100%;
        box-sizing: border-box;
        border: 2px solid #2c2a38;
      }
      .btn-peta-angka {
        width: 46px;
        height: 46px;
        background-color: #2c2a38;
        border: 2px solid #000;
        color: white;
        font-family: "Fredoka One", sans-serif;
        border-radius: 10px;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 1.5rem;
        transition: 0.1s;
      }
      .btn-peta-angka.active {
        background-color: #ff7675;
        color: #fff;
        border-color: #fff;
        transform: scale(1.15) translateY(-2px);
        box-shadow: 0px 4px 0px #000;
      }

      .popup-overlay-global {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        z-index: 9999;
        justify-content: center;
        align-items: center;
      }
      .popup-content-box {
        background-color: #1c1b22;
        border: 4px solid #2ecc71;
        border-radius: 24px;
        padding: 40px;
        text-align: center;
        max-width: 450px;
        width: 90%;
      }
      .popup-btn-next {
        background-color: #f1b811;
        color: #000;
        font-family: "Fredoka One", sans-serif;
        padding: 15px 30px;
        font-size: 1.3rem;
        border: 3px solid #000;
        border-radius: 15px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header class="main-header" style="width: 100%">
      <div class="logo-area">
        <img src="../../../assets/LogoFull.png" class="logo-icon" alt="BuVita Logo" />
        <span class="logo-text"><span class="text-white">BuVita</span> <span class="text-yellow">EduPlay</span></span>
      </div>
      <nav class="nav-menu">
        <a href="../../../index.html" class="nav-item">HOME</a>
        <a href="../../../games.html" class="nav-item active">GAMES</a>
        <a href="../../../kategori.html" class="nav-item">KATEGORI</a>
        <a href="../../../aboutUs.html" class="nav-item">TENTANG KAMI</a>
      </nav>
    </header>

    <div class="game-container">
      <div class="game-header">🔢 Latihan Menulis Angka (0-9) 🔢</div>

      <div class="panel-pilih-angka" id="zonaTombolAngka"></div>

      <div class="papan-tulis-container">
        <div style="color: #aaa; margin-bottom: 15px; font-weight: 900; text-align: center; font-size: 1.2rem">🎯 Hubungkan titik <span style="color: #2ecc71">HIJAU</span> melewati bintang ⭐ sesuai alur panah!</div>
        <canvas id="canvasTulis" width="400" height="400"></canvas>
      </div>

      <div class="navigasi-level-box">
        <button class="btn-nav-level btn-back" onclick="window.location.href = '../../../games.html'">⬅️ KELUAR</button>
        <button class="btn-nav-level btn-next" onclick="loadEngineTracing()">ULANGI LATIHAN 🔄</button>
      </div>

      <div id="successPopup" class="popup-overlay-global">
        <div class="popup-content-box">
          <div style="font-size: 5rem; margin-bottom: 15px">🌟🔢</div>
          <h2 style="font-family: &quot;Fredoka One&quot;; color: #2ecc71; font-size: 2.2rem; margin-bottom: 10px">HEBAT & PINTAR!</h2>
          <p style="color: white; font-size: 1.2rem; margin-bottom: 25px">Kamu berhasil menulis angka ini dengan sangat rapi dan tepat!</p>
          <button class="popup-btn-next" onclick="lanjutAngkaOtomatis()">ANGKA BERIKUTNYA ➡️</button>
        </div>
      </div>
    </div>

    <script>
      // DATABASE VEKTOR ANGKA (0-9)
      const engineDataAngka = {
        0: [
          { x: 200, y: 110 },
          { x: 140, y: 160 },
          { x: 140, y: 240 },
          { x: 200, y: 290 },
          { x: 260, y: 240 },
          { x: 260, y: 160 },
          { x: 200, y: 110 },
        ],
        1: [
          { x: 150, y: 150 },
          { x: 200, y: 110 },
          { x: 200, y: 220 },
          { x: 200, y: 290 },
        ],
        2: [
          { x: 150, y: 150 },
          { x: 200, y: 110 },
          { x: 250, y: 150 },
          { x: 230, y: 210 },
          { x: 180, y: 260 },
          { x: 150, y: 290 },
          { x: 250, y: 290 },
        ],
        3: [
          { x: 150, y: 130 },
          { x: 200, y: 110 },
          { x: 250, y: 140 },
          { x: 210, y: 190 },
          { x: 255, y: 240 },
          { x: 210, y: 290 },
          { x: 150, y: 270 },
        ],
        4: [
          { x: 230, y: 100 },
          { x: 150, y: 230 },
          { x: 270, y: 230 },
          { x: 230, y: 180 },
          { x: 230, y: 300 },
        ],
        5: [
          { x: 250, y: 110 },
          { x: 170, y: 110 },
          { x: 160, y: 190 },
          { x: 220, y: 190 },
          { x: 260, y: 230 },
          { x: 230, y: 290 },
          { x: 160, y: 280 },
        ],
        6: [
          { x: 240, y: 120 },
          { x: 180, y: 140 },
          { x: 150, y: 200 },
          { x: 150, y: 260 },
          { x: 200, y: 290 },
          { x: 250, y: 250 },
          { x: 220, y: 200 },
          { x: 155, y: 210 },
        ],
        7: [
          { x: 140, y: 120 },
          { x: 260, y: 120 },
          { x: 210, y: 210 },
          { x: 180, y: 300 },
        ],
        8: [
          { x: 200, y: 195 },
          { x: 155, y: 155 },
          { x: 200, y: 110 },
          { x: 245, y: 155 },
          { x: 200, y: 195 },
          { x: 150, y: 245 },
          { x: 200, y: 295 },
          { x: 250, y: 245 },
          { x: 200, y: 195 },
        ],
        9: [
          { x: 245, y: 190 },
          { x: 200, y: 210 },
          { x: 155, y: 170 },
          { x: 180, y: 120 },
          { x: 240, y: 130 },
          { x: 245, y: 195 },
          { x: 230, y: 260 },
          { x: 180, y: 295 },
          { x: 140, y: 270 },
        ],
      };

      const listAngka = Object.keys(engineDataAngka);
      let indexAktif = 0;
      let angkaKini = listAngka[indexAktif];

      const canvas = document.getElementById("canvasTulis");
      const ctx = canvas.getContext("2d");

      let checkpoints = [];
      let nextCheckpointIdx = 0;
      let isDrawing = false;
      let userPath = [];

      document.addEventListener("DOMContentLoaded", () => {
        initAngkaMenu();
        loadEngineTracing();

        canvas.addEventListener("mousedown", startTracing);
        canvas.addEventListener("mousemove", doTracing);
        canvas.addEventListener("mouseup", stopTracing);
        canvas.addEventListener("mouseleave", stopTracing);

        canvas.addEventListener("touchstart", (e) => {
          startTracing(e.touches[0]);
        });
        canvas.addEventListener("touchmove", (e) => {
          doTracing(e.touches[0]);
          e.preventDefault();
        });
        canvas.addEventListener("touchend", stopTracing);
      });

      function initAngkaMenu() {
        const zona = document.getElementById("zonaTombolAngka");
        zona.innerHTML = "";
        listAngka.forEach((angka, idx) => {
          const btn = document.createElement("button");
          btn.className = "btn-peta-angka";
          btn.id = `btn-num-${angka}`;
          btn.innerText = angka;
          btn.onclick = () => {
            if (!isDrawing) {
              indexAktif = idx;
              loadEngineTracing();
            }
          };
          zona.appendChild(btn);
        });
      }

      function loadEngineTracing() {
        angkaKini = listAngka[indexAktif];
        document.querySelectorAll(".btn-peta-angka").forEach((b) => b.classList.remove("active"));
        document.getElementById(`btn-num-${angkaKini}`).classList.add("active");

        checkpoints = engineDataAngka[angkaKini].map((p) => ({ ...p, cleared: false }));
        nextCheckpointIdx = 0;
        userPath = [];
        drawEngineFrame();
      }

      function drawEngineFrame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. BACKBONE GUIDE
        ctx.beginPath();
        ctx.strokeStyle = "rgba(255, 255, 255, 0.04)";
        ctx.lineWidth = 45;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        checkpoints.forEach((pt, idx) => {
          if (idx === 0) ctx.moveTo(pt.x, pt.y);
          else ctx.lineTo(pt.x, pt.y);
        });
        ctx.stroke();

        // 2. USER TRACE PATH
        if (userPath.length > 0) {
          ctx.beginPath();
          ctx.strokeStyle = "#ff7675";
          ctx.lineWidth = 20;
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          userPath.forEach((pt, idx) => {
            if (idx === 0) ctx.moveTo(pt.x, pt.y);
            else ctx.lineTo(pt.x, pt.y);
          });
          ctx.stroke();
        }

        // 3. PANAH DIRECTIONAL DINAMIS
        if (nextCheckpointIdx < checkpoints.length) {
          let target = checkpoints[nextCheckpointIdx];
          let dari = nextCheckpointIdx === 0 ? checkpoints[0] : checkpoints[nextCheckpointIdx - 1];

          drawDynamicArrow(dari.x, dari.y, target.x, target.y);

          // START NODE
          ctx.beginPath();
          ctx.arc(checkpoints[0].x, checkpoints[0].y, 14, 0, Math.PI * 2);
          ctx.fillStyle = nextCheckpointIdx === 0 ? "#2ecc71" : "#e67e22";
          ctx.fill();
          ctx.lineWidth = 3;
          ctx.strokeStyle = "#fff";
          ctx.stroke();
        }

        // 4. CHECKPOINT TARGETS
        checkpoints.forEach((pt, idx) => {
          if (idx > 0 && !pt.cleared) {
            ctx.fillStyle = idx === nextCheckpointIdx ? "#f1c40f" : "#34495e";
            ctx.font = "16px sans-serif";
            ctx.fillText("⭐", pt.x - 7, pt.y + 6);
          }
        });
      }

      function drawDynamicArrow(fX, fY, tX, tY) {
        let angle = Math.atan2(tY - fY, tX - fX);
        let midX = (fX + tX) / 2;
        let midY = (fY + tY) / 2;

        ctx.save();
        ctx.translate(midX, midY);
        ctx.rotate(angle);
        ctx.fillStyle = "#f1c40f";

        ctx.beginPath();
        ctx.moveTo(-15, -6);
        ctx.lineTo(3, -6);
        ctx.lineTo(3, -12);
        ctx.lineTo(18, 0);
        ctx.lineTo(3, 12);
        ctx.lineTo(3, 6);
        ctx.lineTo(-15, 6);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function startTracing(e) {
        let pos = getCanvasPos(e);
        let distToStart = Math.hypot(pos.x - checkpoints[0].x, pos.y - checkpoints[0].y);

        if (distToStart < 40) {
          isDrawing = true;
          userPath = [pos];
          if (nextCheckpointIdx === 0) nextCheckpointIdx = 1;
          drawEngineFrame();
        }
      }

      function doTracing(e) {
        if (!isDrawing) return;
        let pos = getCanvasPos(e);
        userPath.push(pos);

        if (nextCheckpointIdx < checkpoints.length) {
          let target = checkpoints[nextCheckpointIdx];
          let jarakKeSensor = Math.hypot(pos.x - target.x, pos.y - target.y);

          if (jarakKeSensor < 35) {
            checkpoints[nextCheckpointIdx].cleared = true;
            nextCheckpointIdx++;

            if (nextCheckpointIdx === checkpoints.length) {
              isDrawing = false;
              document.getElementById("successPopup").style.display = "flex";
            }
          }
        }
        drawEngineFrame();
      }

      function stopTracing() {
        if (!isDrawing) return;
        isDrawing = false;
        if (nextCheckpointIdx < checkpoints.length) {
          loadEngineTracing();
        }
      }

      function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (e.clientX - rect.left) * (canvas.width / rect.width),
          y: (e.clientY - rect.top) * (canvas.height / rect.height),
        };
      }

      function lanjutAngkaOtomatis() {
        document.getElementById("successPopup").style.display = "none";
        indexAktif = (indexAktif + 1) % listAngka.length;
        loadEngineTracing();
      }
    </script>
  </body>
</html>
