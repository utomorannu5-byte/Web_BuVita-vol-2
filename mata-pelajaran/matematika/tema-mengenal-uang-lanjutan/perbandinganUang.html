<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matematika Lanjutan: Berburu Diskon - BuVita EduPlay</title>
    <link rel="stylesheet" href="../../../style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
      body {
        background-color: #121214;
        background-image: radial-gradient(#252529 15%, transparent 16%);
        background-size: 20px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        user-select: none;
        font-family: "Nunito", sans-serif;
        margin: 0;
        padding: 0;
      }
      .game-container {
        width: 100%;
        max-width: 950px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* Header Supermarket */
      .supermarket-header {
        background: linear-gradient(135deg, #1abc9c, #16a085);
        color: white;
        padding: 15px 35px;
        border-radius: 20px;
        border: 4px solid black;
        box-shadow: 6px 6px 0px black;
        font-family: "Fredoka One", sans-serif;
        font-size: 1.8rem;
        margin-bottom: 15px;
        text-align: center;
        width: 100%;
        cursor: pointer;
      }

      .Misi-Teks {
        font-family: "Nunito", sans-serif;
        font-weight: 900;
        color: #f1c40f;
        font-size: 1.3rem;
        margin-bottom: 25px;
        text-align: center;
        text-shadow: 2px 2px 0px black;
      }

      /* LAYOUT DUA RAK SUPERMARKET JALUR GANDA */
      .supermarket-aisle {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 35px;
        width: 100%;
        margin-bottom: 30px;
      }
      @media (max-width: 768px) {
        .supermarket-aisle {
          grid-template-columns: 1fr;
        }
      }

      /* Desain Rak Belanja */
      .rak-belanja-card {
        background-color: #1f1f26;
        border: 4px solid #34495e;
        border-radius: 24px;
        padding: 30px 20px;
        box-shadow: 8px 8px 0px black;
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
        position: relative;
        transition:
          transform 0.2s,
          box-shadow 0.2s,
          border-color 0.2s;
      }
      .rak-belanja-card:hover {
        transform: translateY(-5px);
        border-color: #1abc9c;
        box-shadow:
          0px 0px 20px rgba(26, 188, 156, 0.4),
          8px 8px 0px black;
      }

      .rak-tag {
        position: absolute;
        top: -15px;
        background-color: #34495e;
        color: white;
        font-family: "Fredoka One", sans-serif;
        padding: 5px 20px;
        border-radius: 30px;
        border: 3px solid black;
        font-size: 0.9rem;
      }

      .produk-emoji {
        font-size: 6rem;
        margin: 20px 0;
        filter: drop-shadow(0px 8px 0px rgba(0, 0, 0, 0.4));
      }

      /* Visual Tag Harga & Diskon Coret */
      .harga-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        width: 100%;
      }
      .harga-asli-coret {
        font-family: "Nunito", sans-serif;
        font-weight: 700;
        color: #95a5a6;
        text-decoration: line-through;
        font-size: 1.1rem;
      }
      .harga-pas-tag {
        background-color: #e74c3c;
        color: white;
        font-family: "Fredoka One", sans-serif;
        font-size: 1.6rem;
        padding: 8px 25px;
        border: 3px solid black;
        border-radius: 15px;
        box-shadow: 4px 4px 0px black;
        letter-spacing: 0.5px;
      }
      .warna-normal-tag {
        background-color: #f1c40f;
        color: black;
      }

      /* Banner Diskon Menggantung */
      .badge-diskon {
        position: absolute;
        top: 20px;
        right: 20px;
        background-color: #2ecc71;
        color: white;
        font-family: "Fredoka One", sans-serif;
        padding: 5px 12px;
        border-radius: 8px;
        font-size: 0.9rem;
        transform: rotate(15deg);
        border: 2px solid black;
        animation: pulsaDiskon 1.5s infinite alternate;
      }

      /* Skor Keranjang */
      .keranjang-skor-box {
        background-color: #2c2a38;
        border: 3px solid black;
        border-radius: 16px;
        width: 100%;
        padding: 15px;
        text-align: center;
        box-shadow: inset 0px 0px 10px rgba(0, 0, 0, 0.5);
        font-family: "Fredoka One", sans-serif;
        color: white;
        font-size: 1.1rem;
      }

      @keyframes pulsaDiskon {
        0% {
          transform: rotate(15deg) scale(1);
        }
        100% {
          transform: rotate(15deg) scale(1.1);
        }
      }
      @keyframes shakePop {
        0%,
        100% {
          transform: translateX(0);
        }
        20%,
        60% {
          transform: translateX(-10px);
        }
        40%,
        80% {
          transform: translateX(10px);
        }
      }

      /* Pop-up Global */
      .popup-overlay-global {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        z-index: 9999;
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(5px);
      }
      .popup-content-box {
        background-color: #1f1f26;
        border: 4px solid #2ecc71;
        border-radius: 24px;
        padding: 40px;
        text-align: center;
        max-width: 450px;
        width: 90%;
        box-shadow: 0px 0px 30px rgba(46, 204, 113, 0.3);
      }
      .popup-icon-circle {
        font-size: 5rem;
        margin-bottom: 20px;
      }
      .popup-title {
        font-family: "Fredoka One", sans-serif;
        color: #2ecc71;
        font-size: 2.5rem;
        margin-bottom: 10px;
      }
      .popup-text {
        font-family: "Nunito", sans-serif;
        color: white;
        font-size: 1.2rem;
        margin-bottom: 30px;
        line-height: 1.4;
      }
      .popup-btn-next {
        background-color: #f1b811;
        color: black;
        font-family: "Fredoka One", sans-serif;
        padding: 15px 30px;
        font-size: 1.3rem;
        border: 3px solid black;
        border-radius: 15px;
        box-shadow: 5px 5px 0px black;
        cursor: pointer;
      }

      /* Styling Tombol Navigasi Bawah */
      .navigasi-level-box {
        display: flex;
        justify-content: space-between;
        width: 100%;
        max-width: 900px;
        margin-top: 40px;
        margin-bottom: 20px;
        gap: 20px;
      }

      .btn-nav-level {
        flex: 1;
        font-family: "Fredoka One", sans-serif;
        font-size: 1.1rem;
        padding: 15px 20px;
        border: 3px solid black;
        border-radius: 12px;
        cursor: pointer;
        box-shadow: 4px 4px 0px black;
        transition:
          transform 0.1s,
          box-shadow 0.1s;
        color: white;
      }

      .btn-nav-level:active {
        transform: translate(3px, 3px);
        box-shadow: 1px 1px 0px black;
      }

      /* Warna Tombol Back (Merah Tua/Retro) */
      .btn-nav-level.btn-back {
        background-color: #95a5a6;
        color: black;
      }
      .btn-nav-level.btn-back:hover {
        background-color: #bdc3c7;
      }

      /* Warna Tombol Next (Biru/Ungu Retro) */
      .btn-nav-level.btn-next {
        background-color: #9b59b6;
      }
      .btn-nav-level.btn-next:hover {
        background-color: #8e44ad;
      }

      @media (max-width: 480px) {
        .navigasi-level-box {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <header class="main-header" style="width: 100%">
      <div class="logo-area">
        <img src="../../../assets/LogoFull.png" class="logo-icon" alt="BuVita Logo" />
        <span class="logo-text"><span class="text-white">BuVita</span> <span class="text-yellow">EduPlay</span></span>
      </div>
      <nav class="nav-menu">
        <a href="../../../index.html" class="nav-item">HOME</a>
        <a href="../../../games.html" class="nav-item active">GAMES</a>
        <a href="../../../kategori.html" class="nav-item">KATEGORI</a>
        <a href="../../../aboutUs.html" class="nav-item">TENTANG KAMI</a>
      </nav>
    </header>

    <div class="game-container">
      <div class="supermarket-header" id="instruksiSuaraBtn" onclick="putarSuaraSoal()">🛒 Supermarket Cerdas Berburu Diskon 🔊</div>
      <div class="Misi-Teks">🎯 MISI: Bandingkan harga dan Klik pada Rak Barang yang LEBIH MURAH!</div>

      <div class="supermarket-aisle">
        <div class="rak-belanja-card" onclick="pilihRakBelanja('kiri')">
          <div class="rak-tag" id="tagRakKiri">RAK MERAH</div>
          <div id="diskonKiri"></div>
          <div class="produk-emoji" id="emojiKiri">🍎</div>
          <h3 style="font-family: &quot;Fredoka One&quot;; color: white; margin-bottom: 15px" id="namaKiri">Loading...</h3>
          <div class="harga-container">
            <span class="harga-asli-coret" id="coretKiri">Rp 0</span>
            <span class="harga-pas-tag" id="pasKiri">Rp 0</span>
          </div>
        </div>

        <div class="rak-belanja-card" onclick="pilihRakBelanja('kanan')">
          <div class="rak-tag" id="tagRakKanan">RAK BIRU</div>
          <div id="diskonKanan"></div>
          <div class="produk-emoji" id="emojiKanan">🍎</div>
          <h3 style="font-family: &quot;Fredoka One&quot;; color: white; margin-bottom: 15px" id="namaKanan">Loading...</h3>
          <div class="harga-container">
            <span class="harga-asli-coret" id="coretKanan">Rp 0</span>
            <span class="harga-pas-tag" id="pasKanan">Rp 0</span>
          </div>
        </div>
      </div>

      <div class="keranjang-skor-box" id="infoPoinBox">🧺 Barang Berhasil Dihemat: <span style="color: #1abc9c" id="skorTeks">0</span> Soal</div>

      <div class="navigasi-level-box">
        <button class="btn-nav-level btn-back" onclick="navigasiKembali()">⬅️ GAME SEBELUMNYA</button>
        <button class="btn-nav-level btn-next" onclick="navigasiLanjut()">GAME BERIKUTNYA ➡️</button>
      </div>

      <div id="successPopup" class="popup-overlay-global">
        <div class="popup-content-box">
          <div class="popup-icon-circle">🛒</div>
          <h2 class="popup-title">PILIHAN PINTAR!</h2>
          <p id="popupMessageBenar" class="popup-text"></p>
          <button class="popup-btn-next" onclick="tutupDanLanjutSoal()">CARI DISKON LAGI 🌟</button>
        </div>
      </div>

      <div id="failedPopup" class="popup-overlay-global">
        <div class="popup-content-box" style="border-color: #e74c3c; box-shadow: 0px 0px 30px rgba(231, 76, 60, 0.3)">
          <div class="popup-icon-circle" style="animation: shakePop 0.5s ease-in-out">❌</div>
          <h2 class="popup-title" style="color: #e74c3c">KURANG HEMAT</h2>
          <p id="popupMessageSalah" class="popup-text"></p>
          <button class="popup-btn-next" onclick="tutupDanUlangiSoal()">Coba Cari Lagi</button>
        </div>
      </div>
    </div>

    <script>
      // Database Soal Logika Perbandingan Harga Lanjutan
      const daftarSoalDiskon = [
        {
          nama: "Susu Kotak",
          emoji: "🧃",
          kiri: { hargaFinal: 3000, hargaAsli: 5000, diskonText: "Diskon 40%" },
          kanan: { hargaFinal: 5000, hargaAsli: 0, diskonText: "" },
          jawabanBenar: "kiri",
          audio: "../../../audio/diskon_susu.mp3",
        },
        {
          nama: "Biskuit Cokelat",
          emoji: "🍪",
          kiri: { hargaFinal: 8000, hargaAsli: 0, diskonText: "" },
          kanan: { hargaFinal: 4000, hargaAsli: 7000, diskonText: "Hemat!" },
          jawabanBenar: "kanan",
          audio: "../../../audio/diskon_biskuit.mp3",
        },
        {
          nama: "Jus Jeruk Segar",
          emoji: "🍹",
          kiri: { hargaFinal: 6000, hargaAsli: 10000, diskonText: "Potongan Harga" },
          kanan: { hargaFinal: 9000, hargaAsli: 0, diskonText: "" },
          jawabanBenar: "kiri",
          audio: "../../../audio/diskon_jus.mp3",
        },
        {
          nama: "Kripik Kentang",
          emoji: "🥔",
          kiri: { hargaFinal: 10000, hargaAsli: 0, diskonText: "" },
          kanan: { hargaFinal: 7000, hargaAsli: 9000, diskonText: "Promo Spesial" },
          jawabanBenar: "kanan",
          audio: "../../../audio/diskon_kripik.mp3",
        },
        {
          nama: "Permen Manis",
          emoji: "🍬",
          kiri: { hargaFinal: 2000, hargaAsli: 4000, diskonText: "Murah Banget" },
          kanan: { hargaFinal: 4000, hargaAsli: 0, diskonText: "" },
          jawabanBenar: "kiri",
          audio: "../../../audio/diskon_permen.mp3",
        },
      ];

      let soalSekarang = null;
      let skorSiswa = 0;

      function mulaiGameDiskon() {
        const acak = Math.floor(Math.random() * daftarSoalDiskon.length);
        soalSekarang = daftarSoalDiskon[acak];

        // Pengaturan Rak Kiri
        document.getElementById("emojiKiri").innerText = soalSekarang.emoji;
        document.getElementById("namaKiri").innerText = soalSekarang.nama;
        document.getElementById("pasKiri").innerText = "Rp " + soalSekarang.kiri.hargaFinal.toLocaleString("id-ID");
        if (soalSekarang.kiri.hargaAsli > 0) {
          document.getElementById("coretKiri").innerText = "Rp " + soalSekarang.kiri.hargaAsli.toLocaleString("id-ID");
          document.getElementById("coretKiri").style.display = "inline";
          document.getElementById("diskonKiri").className = "badge-diskon";
          document.getElementById("diskonKiri").innerText = soalSekarang.kiri.diskonText;
          document.getElementById("pasKiri").className = "harga-pas-tag"; // Merah
        } else {
          document.getElementById("coretKiri").style.display = "none";
          document.getElementById("diskonKiri").className = "";
          document.getElementById("diskonKiri").innerText = "";
          document.getElementById("pasKiri").className = "harga-pas-tag warna-normal-tag"; // Kuning
        }

        // Pengaturan Rak Kanan
        document.getElementById("emojiKanan").innerText = soalSekarang.emoji;
        document.getElementById("namaKanan").innerText = soalSekarang.nama;
        document.getElementById("pasKanan").innerText = "Rp " + soalSekarang.kanan.hargaFinal.toLocaleString("id-ID");
        if (soalSekarang.kanan.hargaAsli > 0) {
          document.getElementById("coretKanan").innerText = "Rp " + soalSekarang.kanan.hargaAsli.toLocaleString("id-ID");
          document.getElementById("coretKanan").style.display = "inline";
          document.getElementById("diskonKanan").className = "badge-diskon";
          document.getElementById("diskonKanan").innerText = soalSekarang.kanan.diskonText;
          document.getElementById("pasKanan").className = "harga-pas-tag"; // Merah
        } else {
          document.getElementById("coretKanan").style.display = "none";
          document.getElementById("diskonKanan").className = "";
          document.getElementById("diskonKanan").innerText = "";
          document.getElementById("pasKanan").className = "harga-pas-tag warna-normal-tag"; // Kuning
        }

        putarSuaraSoal();
      }

      function putarSuaraSoal() {
        if (soalSekarang && soalSekarang.audio) {
          let audio = new Audio(soalSekarang.audio);
          audio.play().catch((e) => console.log("Audio belum di-upload"));
        }
      }

      function pilihRakBelanja(pilihan) {
        if (pilihan === soalSekarang.jawabanBenar) {
          let audioBenar = new Audio("../../../audio/menang.mp3");
          audioBenar.play().catch((e) => {});

          skorSiswa++;
          document.getElementById("skorTeks").innerText = skorSiswa;

          const hargaHemat = pilihan === "kiri" ? soalSekarang.kiri.hargaFinal : soalSekarang.kanan.hargaFinal;
          tampilkanPopUpBerhasil(`🎉 Wah, kamu cerdas sekali! Kamu memilih produk seharga <b>Rp ${hargaHemat.toLocaleString("id-ID")}</b> yang jauh lebih murah!<br>Dompetmu jadi aman dari boros. Yuk lanjut! 🧺✨`);
        } else {
          let audioSalah = new Audio("../../../audio/salah.mp3");
          audioSalah.play().catch((e) => {});

          tampilkanPopUpGagal(`⚠️ Aduh, produk di rak itu harganya lebih mahal nih.<br><br>Coba bandingkan angka ribuan harganya lagi dan pilih yang paling kecil ya!`);
        }
      }

      function tampilkanPopUpBerhasil(pesan) {
        document.getElementById("popupMessageBenar").innerHTML = pesan;
        document.getElementById("successPopup").style.display = "flex";
      }

      function tampilkanPopUpGagal(pesan) {
        document.getElementById("popupMessageSalah").innerHTML = pesan;
        document.getElementById("failedPopup").style.display = "flex";
      }

      function tutupDanLanjutSoal() {
        document.getElementById("successPopup").style.display = "none";
        mulaiGameDiskon();
      }

      function tutupDanUlangiSoal() {
        document.getElementById("failedPopup").style.display = "none";
      }

      function navigasiLanjut() {
        alert("🎉 Hebat! Yuk lanjut ke game rilis berikutnya untuk menguji kemampuan belanja pintar kamu!");
      }

      function navigasiKembali() {
        window.location.href = "MesinKembalianMisteri.html";
      }

      document.addEventListener("DOMContentLoaded", () => {
        mulaiGameDiskon();
      });
    </script>
  </body>
</html>
