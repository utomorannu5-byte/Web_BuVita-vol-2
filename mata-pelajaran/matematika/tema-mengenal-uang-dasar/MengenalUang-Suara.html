<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matematika Basic: Mengenal Uang Rupiah - BuVita EduPlay</title>
    <link rel="stylesheet" href="../../../style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />

    <style>
      body {
        background-image: radial-gradient(#333333 15%, transparent 16%);
        background-size: 16px 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .game-container {
        width: 100%;
        max-width: 900px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .header {
        background-color: #caa011;
        color: black;
        padding: 20px;
        border-radius: 12px;
        border: 3px solid black;
        box-shadow: 5px 5px 0px black;
        text-align: center;
        font-weight: 900;
        margin-bottom: 30px;
        width: 100%;
        cursor: pointer;
      }

      .quiz-box {
        background-color: #2e2e2e;
        border: 3px solid #f1b811;
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 25px;
        width: 100%;
        text-align: center;
        font-size: 1.3rem;
        font-weight: 900;
        color: #ffffff;
        box-shadow: 4px 4px 0px #000000;
        display: none;
      }

      .grid-uang {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        width: 100%;
      }

      .card-uang {
        background: #f0f0f0;
        border: 3px solid black;
        border-radius: 15px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        box-shadow: 4px 4px 0px black;
      }

      .card-uang:active {
        transform: translate(3px, 3px);
        box-shadow: 1px 1px 0px black;
      }

      .card-uang img {
        width: 100%;
        height: auto;
        border-radius: 8px;
        border: 2px solid #000;
        margin-bottom: 10px;
      }

      .card-uang p {
        color: black;
        font-weight: 900;
        font-size: 1.1rem;
      }

      .controls-area {
        display: flex;
        gap: 15px;
        margin-top: 40px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .btn-quiz {
        padding: 15px 40px;
        background-color: #2ecc71;
        color: white;
        border: 3px solid black;
        border-radius: 10px;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 5px 5px 0px black;
        font-size: 1.1rem;
        transition:
          transform 0.1s,
          box-shadow 0.1s;
      }

      .btn-quiz:active {
        transform: translate(3px, 3px);
        box-shadow: 1px 1px 0px black;
      }

      .btn-level {
        padding: 15px 30px;
        background-color: #3498db;
        color: white;
        border: 3px solid black;
        border-radius: 10px;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 5px 5px 0px black;
        font-size: 1.1rem;
        display: none;
      }

      /* Styling Pop-up Sukses */
      .popup-overlay-global {
        display: none; /* Sembunyi secara default */
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        z-index: 9999;
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(5px);
      }

      .popup-content-box {
        background-color: #1e1e1e;
        border: 4px solid #2ecc71;
        border-radius: 24px;
        padding: 40px;
        text-align: center;
        max-width: 450px;
        width: 90%;
        box-shadow: 0px 0px 30px rgba(46, 204, 113, 0.3);
        animation: zoomInPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .popup-icon-circle {
        font-size: 5rem;
        margin-bottom: 20px;
        animation: bouncePop 1s infinite;
      }

      .popup-title {
        font-family: "Fredoka One", sans-serif;
        color: #2ecc71;
        font-size: 2.5rem;
        margin-bottom: 10px;
      }

      .popup-text {
        font-family: "Nunito", sans-serif;
        color: white;
        font-size: 1.2rem;
        margin-bottom: 30px;
        line-height: 1.4;
      }

      .popup-btn-next {
        background-color: #f1b811;
        color: black;
        font-family: "Fredoka One", sans-serif;
        padding: 15px 30px;
        font-size: 1.3rem;
        border: 3px solid black;
        border-radius: 15px;
        box-shadow: 5px 5px 0px black;
        cursor: pointer;
        transition: 0.2s;
      }

      .popup-btn-next:hover {
        transform: scale(1.05);
        background-color: #ffc107;
      }

      @keyframes zoomInPop {
        from {
          transform: scale(0.5);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      @keyframes bouncePop {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-15px);
        }
      }

      /* Efek Animasi Guncang untuk Pop-up Salah */
      @keyframes shakePop {
        0%,
        100% {
          transform: translateX(0);
        }
        20%,
        60% {
          transform: translateX(-10px);
        }
        40%,
        80% {
          transform: translateX(10px);
        }
      }

      /* Styling khusus untuk tombol kembali ke Level 1 */
      .btn-back-level {
        padding: 15px 30px;
        background-color: #e74c3c;
        color: white;
        border: 3px solid black;
        border-radius: 10px;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 5px 5px 0px black;
        font-size: 1.1rem;
        display: none; /* Hanya muncul di Level 2 */
        transition:
          transform 0.1s,
          box-shadow 0.1s;
      }

      .btn-back-level:active {
        transform: translate(3px, 3px);
        box-shadow: 1px 1px 0px black;
      }
    </style>
  </head>
  <body>
    <header class="main-header" style="width: 100%">
      <div class="logo-area">
        <img src="../../../assets/LogoFull.png" class="logo-icon" alt="Logo" />
        <span class="logo-text"><span class="text-white">BuVita</span> <span class="text-yellow">EduPlay</span></span>
      </div>
      <nav class="nav-menu">
        <a href="../../../index.html" class="nav-item">HOME</a>
        <a href="../../../games.html" class="nav-item active">GAMES</a>
        <a href="../../../kategori.html" class="nav-item">KATEGORI</a>
        <a href="../../../aboutUs.html" class="nav-item">TENTANG KAMI</a>
      </nav>
      <div class="header-actions">
        <button class="action-btn">🔍</button>
        <button class="action-btn">🌐</button>
      </div>
    </header>

    <div class="game-container">
      <div class="header" id="levelTitle" onclick="playIntro()">Klik gambar uang di bawah ini, dan dengarkan pernjelasan BuVita yaa!</div>

      <div class="quiz-box" id="quizBox">BuVita tanya: Mana ya uang <span id="targetNominalText" style="color: #f1b811">-</span>?</div>

      <div class="grid-uang" id="gridUang"></div>

      <div class="controls-area">
        <button class="btn-back-level" id="backLevelBtn" onclick="pindahKeLevel1()">⬅️ Kembali</button>
        <button class="btn-quiz" id="quizBtn" onclick="startQuiz()">BuVita Bertanya!</button>
        <button class="btn-level" id="levelBtn" onclick="pindahKeLevel2()">🚀 Lanjut ke Level Berikutnya</button>
        <a href="TanyaAcak.html" class="btn-level" id="nextGameBtn" style="background-color: #e67e22; text-decoration: none; text-align: center">🎯 Lanjut ke Kuis Acak!</a>
      </div>

      <!-- Pop-up Zoom Gambar Mata Uang -->
      <div id="imageZoomPopup" class="popup-overlay-global" onclick="tutupZoomGambar()">
        <div class="popup-content-box" style="background-color: #ffffff; border-color: #f1b811; max-width: 650px" onclick="event.stopPropagation()">
          <img id="zoomedImage" src="" alt="Zoom Uang" style="width: 100%; height: auto; border: 4px solid black; border-radius: 12px; margin-bottom: 20px" />
          <button class="popup-btn-next" style="background-color: #e74c3c; color: white" onclick="tutupZoomGambar()">❌ Tutup Gambar</button>
        </div>
      </div>

      <div id="successPopup" class="popup-overlay-global">
        <div class="popup-content-box">
          <div class="popup-icon-circle">🌟</div>
          <h2 class="popup-title">HEBAT!</h2>
          <p id="popupMessageBenar" class="popup-text"></p>
          <button class="popup-btn-next" onclick="tutupDanLanjutSoal()">Lanjutkan Soal</button>
        </div>
      </div>

      <div id="failedPopup" class="popup-overlay-global">
        <div class="popup-content-box" style="border-color: #e74c3c; box-shadow: 0px 0px 30px rgba(231, 76, 60, 0.3)">
          <div class="popup-icon-circle" style="animation: shakePop 0.5s ease-in-out">⚠️</div>
          <h2 class="popup-title" style="color: #e74c3c">Kurang Tepat!</h2>
          <p id="popupMessageSalah" class="popup-text"></p>
          <button class="popup-btn-next" onclick="tutupDanUlangiSoal()">Coba Lagi</button>
        </div>
      </div>
    </div>

    <script>
      let currentAudio = null;
      let isPlaying = false;
      let isQuizMode = false;
      let targetNominal = 0;
      let currentLevel = 1;

      const dataUangLevel1 = [
        { nominal: 1000, teks: "Seribu Rupiah", img: "../assets/uang1000.png", alt: "Seribu", audioBelajar: "../audio/1000.mp3", audioTanya: "../audio/tanya1000.mp3" },
        { nominal: 2000, teks: "Dua Ribu Rupiah", img: "../assets/uang2000.png", alt: "Dua Ribu", audioBelajar: "../audio/2000.mp3", audioTanya: "../audio/tanya2000.mp3" },
        { nominal: 5000, teks: "Lima Ribu Rupiah", img: "../assets/uang5000.png", alt: "Lima Ribu", audioBelajar: "../audio/5000.mp3", audioTanya: "../audio/tanya5000.mp3" },
        { nominal: 10000, teks: "Sepuluh Ribu Rupiah", img: "../assets/uang10000.png", alt: "Sepuluh Ribu", audioBelajar: "../audio/10000.mp3", audioTanya: "../audio/tanya10000.mp3" },
      ];

      const dataUangLevel2 = [
        { nominal: 10000, teks: "Sepuluh Ribu Rupiah", img: "../assets/uang10000.png", alt: "Sepuluh Ribu", audioBelajar: "../audio/10000.mp3", audioTanya: "../audio/tanya10000.mp3" },
        { nominal: 20000, teks: "Dua Puluh Ribu Rupiah", img: "../assets/uang20000.png", alt: "Dua Puluh Ribu", audioBelajar: "../audio/20000.mp3", audioTanya: "../audio/tanya20000.mp3" },
        { nominal: 50000, teks: "Lima Puluh Ribu Rupiah", img: "../assets/uang50000.png", alt: "Lima Puluh Ribu", audioBelajar: "../audio/50000.mp3", audioTanya: "../audio/tanya50000.mp3" },
        { nominal: 100000, teks: "Seratus Ribu Rupiah", img: "../assets/uang100000.png", alt: "Seratus Ribu", audioBelajar: "../audio/100000.mp3", audioTanya: "../audio/tanya100000.mp3" },
      ];

      function getCurrentDataset() {
        return currentLevel === 1 ? dataUangLevel1 : dataUangLevel2;
      }

      function renderHalamanGame() {
        const grid = document.getElementById("gridUang");
        grid.innerHTML = "";
        const dataset = getCurrentDataset();

        dataset.forEach((uang) => {
          const card = document.createElement("div");
          card.className = "card-uang";
          card.onclick = () => pilihUang(uang.nominal, uang.audioBelajar);
          card.innerHTML = `
                    <img src="${uang.img}" alt="${uang.alt}">
                    <p>Rp ${uang.nominal.toLocaleString("id-ID")}</p>
                `;
          grid.appendChild(card);
        });
      }

      function playSuara(path) {
        if (isPlaying) return;
        isPlaying = true;
        currentAudio = new Audio(path);
        currentAudio
          .play()
          .then(() => {
            currentAudio.onended = function () {
              isPlaying = false;
              currentAudio = null;
            };
          })
          .catch((e) => {
            isPlaying = false;
          });
      }

      function playIntro() {
        if (currentLevel === 1) {
          playSuara("../audio/judulMengenalUang.mp3");
        } else {
          playSuara("../audio/judulMengenalUang.mp3");
        }
      }

      function startQuiz() {
        if (isPlaying) return;
        isQuizMode = true;

        const dataset = getCurrentDataset();
        const soalAcak = dataset[Math.floor(Math.random() * dataset.length)];
        targetNominal = soalAcak.nominal;

        document.getElementById("targetNominalText").innerText = soalAcak.teks;
        document.getElementById("quizBox").style.display = "block";
        document.getElementById("quizBtn").innerText = "🔄 Ganti Pertanyaan Acak";

        playSuara(soalAcak.audioTanya);
      }

      function pilihUang(nominalTerpilih, audioPecahanPath) {
        if (isPlaying) return;

        if (isQuizMode) {
          if (nominalTerpilih === targetNominal) {
            playSuara("../audio/menang2.mp3");
            tampilkanPopUpBerhasil("Pilihanmu Tepat Sekali.");

            document.getElementById("quizBox").style.display = "none";
            document.getElementById("quizBtn").innerText = "BuVita Bertanya!";
            isQuizMode = false;

            if (currentLevel === 1) {
              document.getElementById("levelBtn").style.display = "block";
            } else {
              document.getElementById("nextGameBtn").style.display = "block";
            }
          } else {
            playSuara("../audio/salah2.mp3");
            tampilkanPopUpGagal("Pilih Lagi Jawaban yang Benar.");
          }
        } else {
          // MODE BELAJAR: Putar suara sekaligus panggil pop-up gambar membesar
          playSuara(audioPecahanPath);
          tampilkanZoomGambar(nominalTerpilih);
        }
      }

      // Fungsi Baru untuk Membuka Gambar Besar
      function tampilkanZoomGambar(nominal) {
        const dataset = getCurrentDataset();
        const dataTerpilih = dataset.find((u) => u.nominal === nominal);

        if (dataTerpilih) {
          const popupImg = document.getElementById("zoomedImage");
          popupImg.src = dataTerpilih.img;
          popupImg.alt = dataTerpilih.alt;

          document.getElementById("imageZoomPopup").style.display = "flex";
        }
      }

      // Fungsi Baru untuk Menutup Gambar Besar
      function tutupZoomGambar() {
        document.getElementById("imageZoomPopup").style.display = "none";
      }

      function tampilkanPopUpBerhasil(pesan) {
        document.getElementById("popupMessageBenar").innerHTML = pesan;
        document.getElementById("successPopup").style.display = "flex";
      }

      function tutupDanLanjutSoal() {
        document.getElementById("successPopup").style.display = "none";
      }

      function tampilkanPopUpGagal(pesan) {
        document.getElementById("popupMessageSalah").innerHTML = pesan;
        document.getElementById("failedPopup").style.display = "flex";
      }

      function tutupDanUlangiSoal() {
        document.getElementById("failedPopup").style.display = "none";
      }

      // Fungsi Masuk ke Level 2
      function pindahKeLevel2() {
        currentLevel = 2;
        isQuizMode = false;

        document.getElementById("levelTitle").innerText = "Klik/Tap Gambar Uang dan Simak Baik-baik ya!) 🌟";
        document.getElementById("levelBtn").style.display = "none";
        document.getElementById("quizBox").style.display = "none";
        document.getElementById("quizBtn").innerText = "BuVita Bertanya!";
        document.getElementById("nextGameBtn").style.display = "none";

        // Tampilkan tombol "Kembali ke Level 1"
        document.getElementById("backLevelBtn").style.display = "block";

        renderHalamanGame();
      }

      // Fungsi Kembali ke Level 1 (Bisa diulang-ulang)
      function pindahKeLevel1() {
        currentLevel = 1;
        isQuizMode = false;

        document.getElementById("levelTitle").innerText = "Klik/Tap Gambar Uang dan Simak Baik-baik ya!";
        document.getElementById("levelBtn").style.display = "none";
        document.getElementById("quizBox").style.display = "none";
        document.getElementById("quizBtn").innerText = "BuVita Bertanya!";
        document.getElementById("nextGameBtn").style.display = "none";

        // Sembunyikan kembali tombol dirinya sendiri
        document.getElementById("backLevelBtn").style.display = "none";

        renderHalamanGame();
      }

      renderHalamanGame();
    </script>
  </body>
</html>
