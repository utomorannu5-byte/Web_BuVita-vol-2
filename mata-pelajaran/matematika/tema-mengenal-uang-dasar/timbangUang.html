<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matematika Basic: Timbangan Ajaib - BuVita EduPlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
      /* RESET & TEMA UTAMA DARK RETRO */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-dark: #121212;
        --bg-container: #1e1e1e;
        --classic-yellow: #f1b811;
        --border-retro: 3px solid #000000;
        --shadow-retro: 5px 5px 0px #000000;
      }

      body {
        font-family: "Nunito", sans-serif;
        background-color: var(--bg-dark);
        background-image: radial-gradient(#333333 15%, transparent 16%);
        background-size: 16px 16px;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        user-select: none;
        min-height: 100vh;
        padding: 20px;
      }

      /* HEADER & INSTRUKSI */
      .header {
        background-color: #caa011;
        color: #000000;
        padding: 15px 25px;
        border: var(--border-retro);
        border-radius: 12px;
        text-align: center;
        font-weight: 900;
        font-size: 1.3rem;
        margin-bottom: 25px;
        box-shadow: var(--shadow-retro);
        width: 100%;
        max-width: 800px;
        cursor: pointer;
      }

      #questionText {
        font-size: 1.5rem;
        color: #000000;
        font-weight: 900;
        margin-top: 5px;
      }

      /* WADAH UTAMA GAME */
      .game-container {
        position: relative;
        width: 100%;
        max-width: 800px;
        background: #f0f0f0;
        border: var(--border-retro);
        border-radius: 16px;
        box-shadow: var(--shadow-retro);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
        min-height: 500px;
      }

      /* VISUAL TIMBANGAN */
      .timbangan-wrapper {
        position: relative;
        width: 100%;
        height: 300px;
        display: flex;
        justify-content: center;
        align-items: flex-end;
        margin-bottom: 20px;
      }

      /* Tiang Tengah Timbangan */
      .tiang-pusat {
        width: 20px;
        height: 180px;
        background-color: #34495e;
        border: 3px solid #000;
        position: absolute;
        bottom: 0;
        z-index: 1;
      }
      .tapak-tiang {
        width: 100px;
        height: 20px;
        background-color: #2c3e50;
        border: 3px solid #000;
        position: absolute;
        bottom: 0;
        border-radius: 5px 5px 0 0;
        z-index: 2;
      }

      /* Lengan Timbangan yang Bisa Miring */
      .lengan-timbangan {
        width: 500px;
        height: 16px;
        background-color: #caa011;
        border: 3px solid #000;
        position: absolute;
        bottom: 160px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 10px;
        transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        transform-origin: center center;
        z-index: 3;
      }

      /* Poros Tengah */
      .lengan-timbangan::after {
        content: "";
        width: 20px;
        height: 20px;
        background-color: #e74c3c;
        border: 3px solid #000;
        border-radius: 50%;
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }

      /* Kondisi Kemiringan Timbangan */
      .miring-kiri {
        transform: rotate(-12deg);
      }
      .miring-kanan {
        transform: rotate(12deg);
      }
      .seimbang {
        transform: rotate(0deg);
      }

      /* Wadah Gantung untuk Uang (Kiri & Kanan) */
      .wadah-gantung {
        width: 160px;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: absolute;
        top: 10px;
        transition: transform 0.6s;
      }
      .wadah-gantung.kiri {
        left: -40px;
      }
      .wadah-gantung.kanan {
        right: -40px;
      }

      /* Tali Gantungan */
      .tali-gantung {
        width: 0;
        height: 50px;
        border-left: 3px dashed #333;
      }

      /* KARTU UANG (BISA DIKLIK) */
      .card-uang {
        width: 150px;
        height: 85px;
        background-color: #ffffff;
        border: 3px solid #000000;
        border-radius: 10px;
        box-shadow: 4px 4px 0px #000000;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        overflow: hidden;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      .card-uang:hover {
        transform: scale(1.05);
      }

      .card-uang img {
        width: 85%;
        height: 85%;
        object-fit: contain;
      }

      /* POPUP KEMENANGAN RETRO */
      .popup-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        z-index: 999;
        justify-content: center;
        align-items: center;
      }
      .popup-box {
        background: var(--bg-container);
        border: var(--border-retro);
        padding: 40px;
        border-radius: 16px;
        text-align: center;
        box-shadow: var(--shadow-retro);
        max-width: 450px;
        width: 85%;
      }
      .popup-box h2 {
        font-size: 3rem;
        margin-bottom: 10px;
      }
      .popup-box h3 {
        font-family: "Fredoka One", sans-serif;
        color: var(--classic-yellow);
        font-size: 2rem;
        margin-bottom: 15px;
      }
      .popup-box p {
        color: #e0e0e0;
        font-size: 1.2rem;
        margin-bottom: 25px;
        font-weight: 700;
      }

      .btn-action {
        padding: 12px 35px;
        background-color: var(--classic-yellow);
        color: #000;
        border: var(--border-retro);
        border-radius: 8px;
        font-size: 1.1rem;
        cursor: pointer;
        font-weight: 900;
        box-shadow: var(--shadow-retro);
      }
      .btn-action:active {
        transform: translate(3px, 3px);
        box-shadow: 1px 1px 0px #000;
      }
    </style>
  </head>
  <body>
    <div class="header" id="headerInstruction">
      <span style="font-family: &quot;Fredoka One&quot;; background: #000; color: #fff; padding: 2px 10px; border-radius: 5px; font-size: 0.9rem">TIMBANGAN AJAIB</span>
      <div id="questionText">Memuat Soal...</div>
    </div>

    <div class="game-container">
      <div class="timbangan-wrapper">
        <!-- Tiang Penyangga Tetap -->
        <div class="tiang-pusat"></div>
        <div class="tapak-tiang"></div>

        <!-- Lengan yang Bergerak Miring -->
        <div class="lengan-timbangan seimbang" id="lenganTimbangan">
          <!-- Sisi Kiri -->
          <div class="wadah-gantung kiri">
            <div class="tali-gantung"></div>
            <div class="card-uang" id="cardKiri" onclick="pilihJawaban('kiri')">
              <img id="imgKiri" src="" alt="Uang Kiri" />
            </div>
          </div>

          <!-- Sisi Kanan -->
          <div class="wadah-gantung kanan">
            <div class="tali-gantung"></div>
            <div class="card-uang" id="cardKanan" onclick="pilihJawaban('kanan')">
              <img id="imgKanan" src="" alt="Uang Kanan" />
            </div>
          </div>
        </div>
      </div>

      <button class="btn-action" onclick="resetGame()">Main Dari Awal</button>
    </div>

    <!-- POPUP BERHASIL SOAL -->
    <div id="winPopup" class="popup-overlay">
      <div class="popup-box">
        <h2>🎉 ⭐ 🎉</h2>
        <h3>LUAR BIASA!</h3>
        <p>Kamu hebat! Semua tantangan timbangan berhasil diselesaikan! 🌟</p>
        <button onclick="tutupPopupDanReset()" class="btn-action" style="background-color: #27ae60; color: white">Main Lagi</button>
      </div>
    </div>

    <!-- AUDIO (Sesuaikan dengan file audio BuVita) -->
    <audio id="soundCorrect" src="../audio/benar.mp3" preload="auto"></audio>
    <audio id="soundWrong" src="../audio/salah2.mp3" preload="auto"></audio>
    <audio id="soundWin" src="../audio/menang2.mp3" preload="auto"></audio>

    <script>
      // Data Soal: Nilai angka menentukan "berat" kemiringan timbangan
      const daftarSoal = [
        { kiri: { nominal: 1000, img: "../assets/uang1000.png" }, kanan: { nominal: 5000, img: "../assets/uang5000.png" }, tipe: "BESAR" },
        { kiri: { nominal: 20000, img: "../assets/uang20000.png" }, kanan: { nominal: 2000, img: "../assets/uang2000.png" }, tipe: "KECIL" },
        { kiri: { nominal: 100000, img: "../assets/uang100000.png" }, kanan: { nominal: 50000, img: "../assets/uang50000.png" }, tipe: "BESAR" },
        { kiri: { nominal: 10000, img: "../assets/uang10000.png" }, kanan: { nominal: 100000, img: "../assets/uang100000.png" }, tipe: "KECIL" },
      ];

      let indexSoalSekarang = 0;
      let jawabanBenarSisi = "";

      const lengan = document.getElementById("lenganTimbangan");
      const imgKiri = document.getElementById("imgKiri");
      const imgKanan = document.getElementById("imgKanan");
      const questionText = document.getElementById("questionText");

      function muatSoal() {
        if (indexSoalSekarang >= daftarSoal.length) {
          document
            .getElementById("soundWin")
            .play()
            .catch((e) => {});
          document.getElementById("winPopup").style.display = "flex";
          return;
        }

        const soal = daftarSoal[indexSoalSekarang];

        // Pasang Gambar Uang
        imgKiri.src = soal.kiri.img;
        imgKanan.src = soal.kanan.img;

        // Atur Teks Instruksi BuVita
        if (soal.tipe === "BESAR") {
          questionText.innerText = "Mana uang yang nilainya LEBIH BESAR? Ketuk uangnya!";
        } else {
          questionText.innerText = "Mana uang yang nilainya LEBIH KECIL? Ketuk uangnya!";
        }

        // Atur Efek Kemiringan Animasi Timbangan Otomatis berdasarkan nominal terberat
        lengan.className = "lengan-timbangan"; // reset dulu
        if (soal.kiri.nominal > soal.kanan.nominal) {
          lengan.classList.add("miring-kiri"); // Kiri turun ke bawah karena lebih berat/besar
          jawabanBenarSisi = soal.tipe === "BESAR" ? "kiri" : "kanan";
        } else {
          lengan.classList.add("miring-kanan"); // Kanan turun ke bawah karena lebih berat/besar
          jawabanBenarSisi = soal.tipe === "BESAR" ? "kanan" : "kiri";
        }
      }

      function pilihJawaban(sisiYangDiklik) {
        if (sisiYangDiklik === jawabanBenarSisi) {
          document
            .getElementById("soundCorrect")
            .play()
            .catch((e) => {});

          // Beri jeda sebentar sebelum ganti ke soal berikutnya
          indexSoalSekarang++;
          setTimeout(muatSoal, 1200);
        } else {
          document
            .getElementById("soundWrong")
            .play()
            .catch((e) => {});
          // Berikan efek getar visual kecil jika salah (opsional)
          const kartuSalah = sisiYangDiklik === "kiri" ? document.getElementById("cardKiri") : document.getElementById("cardKanan");
          kartuSalah.style.borderColor = "red";
          setTimeout(() => (kartuSalah.style.borderColor = "#000"), 500);
        }
      }

      function resetGame() {
        indexSoalSekarang = 0;
        muatSoal();
      }

      function tutupPopupDanReset() {
        document.getElementById("winPopup").style.display = "none";
        resetGame();
      }

      // Jalankan game pertama kali saat halaman siap
      window.addEventListener("load", muatSoal);
    </script>
  </body>
</html>
