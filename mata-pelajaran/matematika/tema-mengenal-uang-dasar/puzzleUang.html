<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Puzzle Uang Level 1 - BuVita EduPlay</title>
    <link rel="stylesheet" href="../../../style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />

    <style>
      body {
        background-image: radial-gradient(#333333 15%, transparent 16%);
        background-size: 16px 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        font-family: "Nunito", sans-serif;
      }

      .game-container {
        width: 100%;
        max-width: 900px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .header {
        background-color: #f1b811;
        color: black;
        padding: 20px;
        border-radius: 12px;
        border: 3px solid black;
        box-shadow: 5px 5px 0px black;
        font-family: "Fredoka One", sans-serif;
        font-size: 2rem;
        margin-bottom: 25px;
        text-align: center;
        width: 100%;
        text-transform: uppercase;
      }

      /* PROGRES SCORE / SOAL KE-BERAPA */
      .score-board {
        font-family: "Fredoka One", sans-serif;
        font-size: 1.3rem;
        color: #ffffff;
        background: #1e1e1e;
        padding: 10px 25px;
        border-radius: 30px;
        border: 2px solid black;
        margin-bottom: 15px;
        box-shadow: 3px 3px 0px black;
      }

      /* AREA PUZZLE WORKSPACE */
      .puzzle-board {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
        width: 100%;
        background-color: #1e1e1e;
        border: 3px solid black;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 6px 6px 0px black;
      }

      /* KOTAK TEMPAT MENYUSUN (DROP ZONE) */
      .slots-container {
        display: flex;
        justify-content: center;
        background-color: #2c3e50;
        border: 4px dashed #3498db;
        border-radius: 15px;
        padding: 10px;
        width: 100%;
        max-width: 600px;
        height: 220px;
      }

      .puzzle-slot {
        flex: 1;
        height: 100%;
        border: 2px dashed rgba(255, 255, 255, 0.2);
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        background-color: rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }

      .puzzle-slot.drag-over {
        background-color: rgba(52, 152, 219, 0.4);
      }

      /* PAPAN POTONGAN PUZZLE (PIECES ZONE) */
      .pieces-container {
        display: flex;
        justify-content: center;
        gap: 20px;
        width: 100%;
        padding: 20px;
        background-color: #34495e;
        border-radius: 12px;
        border: 3px solid black;
        min-height: 220px;
        align-items: center;
      }

      .puzzle-piece {
        width: 180px;
        height: 180px;
        background-size: 540px 180px; /* Potongan otomatis gambar 3 bagian */
        background-repeat: no-repeat;
        border: 3px solid black;
        border-radius: 10px;
        cursor: grab;
        box-shadow: 4px 4px 0px black;
        transition: transform 0.2s;
      }

      .puzzle-piece:active {
        cursor: grabbing;
        transform: scale(1.05);
      }

      /* POPUP GLOBAL */
      .popup-overlay-global {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        z-index: 9999;
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(5px);
      }

      .popup-content-box {
        background-color: #1e1e1e;
        border: 4px solid #2ecc71;
        border-radius: 24px;
        padding: 40px;
        text-align: center;
        max-width: 450px;
        width: 90%;
        box-shadow: 0px 0px 30px rgba(46, 204, 113, 0.3);
      }

      .popup-title {
        font-family: "Fredoka One", sans-serif;
        color: #3498db;
        font-size: 2.2rem;
        margin-bottom: 15px;
      }

      .popup-text {
        color: white;
        font-size: 1.2rem;
        margin-bottom: 30px;
      }

      .popup-btn-next {
        background-color: #f1b811;
        color: black;
        font-family: "Fredoka One", sans-serif;
        padding: 15px 30px;
        font-size: 1.3rem;
        border: 3px solid black;
        border-radius: 15px;
        box-shadow: 5px 5px 0px black;
        cursor: pointer;
        width: 100%;
        margin-bottom: 10px;
      }

      .btn-next-level {
        background-color: #2ecc71;
        color: white;
        font-family: "Fredoka One", sans-serif;
        font-size: 1.4rem;
        padding: 15px 40px;
        border: 3px solid black;
        border-radius: 12px;
        cursor: pointer;
        box-shadow: 4px 4px 0px black;
        margin-top: 25px;
        display: none;
      }
    </style>
  </head>
  <body>
    <header class="main-header" style="width: 100%">
      <div class="logo-area">
        <img src="../../../assets/LogoFull.png" class="logo-icon" alt="BuVita Logo" />
        <span class="logo-text"><span class="text-white">BuVita</span> <span class="text-yellow">EduPlay</span></span>
      </div>
      <nav class="nav-menu">
        <a href="../../../index.html" class="nav-item">HOME</a>
        <a href="../../../games.html" class="nav-item active">GAMES</a>
        <a href="../../../kategori.html" class="nav-item">KATEGORI</a>
        <a href="../../../aboutUs.html" class="nav-item">TENTANG KAMI</a>
      </nav>
      <div class="header-actions">
        <button class="action-btn">🔍</button>
        <button class="action-btn">🌐</button>
      </div>
    </header>

    <div class="game-container">
      <div class="header">🧩 PUZZLE PECAHAN MATA UANG</div>

      <div class="score-board" id="progressText">Tantangan: 0 / 0</div>

      <div class="puzzle-board">
        <!-- ZONA KOTAK PENYUSUNAN -->
        <div class="slots-container">
          <div class="puzzle-slot" data-order="0"></div>
          <div class="puzzle-slot" data-order="1"></div>
          <div class="puzzle-slot" data-order="2"></div>
        </div>

        <!-- ZONA PILIHAN POTONGAN ACAK -->
        <div class="pieces-container" id="piecesContainer"></div>
      </div>

      <button class="btn-next-level" id="nextLevelBtn" onclick="lanjutKeLevelDua()">LEVEL 2: PASANG ATRIBUT ➡️</button>

      <!-- WELCOME POPUP -->
      <div id="welcomePopup" class="popup-overlay-global" style="display: flex">
        <div class="popup-content-box" style="border-color: #3498db">
          <div style="font-size: 4rem; margin-bottom: 10px">🧩</div>
          <h2 class="popup-title">Ayo, Bermain Puzzle!</h2>
          <p class="popup-text">Satukan Potongan Mata Uang Menjadi Sempurna</p>
          <button class="popup-btn-next" style="background-color: #3498db; color: white" onclick="dengarPetunjukAwal()">🔊 DENGAR PETUNJUK</button>
          <button class="popup-btn-next" style="background-color: #2ecc71; color: white; border-color: #27ae60" onclick="mulaiGame()">MAIN SEKARANG ➡️</button>
        </div>
      </div>

      <!-- POPUP SUKSES PER SOAL -->
      <div id="successPopup" class="popup-overlay-global">
        <div class="popup-content-box">
          <div style="font-size: 5rem; margin-bottom: 20px">🌟</div>
          <h2 class="popup-title" style="color: #2ecc71" id="successTitle">HEBAT!</h2>
          <p class="popup-text" id="successMessage">Hore! Kamu berhasil menyatukan uang dengan sempurna!</p>
          <button class="popup-btn-next" style="background-color: #f1b811" id="actionPopupBtn" onclick="lanjutSoalBerikutnya()">SOAL BERIKUTNYA</button>
        </div>
      </div>
    </div>

    <script>
      let audioMisi = null;
      let audioInstruksiAwal = new Audio("../audio/instruksi_puzzle1.mp3");
      let totalSuksesKepingan = 0;
      let draggedPieceId = null;

      // Variabel Kontrol Antrean Soal
      let indeksSoalSekarang = 0;
      let bankUangLevel1 = [];

      // Dataset Lengkap Uang Rupiah yang akan diacak
      const datasetUangLengkap = [
        { teks: "Seribu Rupiah", img: "../assets/uang1000.png", audio: "../audio/1000.mp3" },
        { teks: "Dua Ribu Rupiah", img: "../assets/uang2000.png", audio: "../audio/2000.mp3" },
        { teks: "Lima Ribu Rupiah", img: "../assets/uang5000.png", audio: "../audio/5000.mp3" },
        { teks: "Sepuluh Ribu Rupiah", img: "../assets/uang10000.png", audio: "../audio/10000.mp3" },
        { teks: "Dua Puluh Ribu Rupiah", img: "../assets/uang20000.png", audio: "../audio/20000.mp3" },
        { teks: "Lima Puluh Ribu Rupiah", img: "../assets/uang50000.png", audio: "../audio/50000.mp3" },
        { teks: "Seratus Ribu Rupiah", img: "../assets/uang100000.png", audio: "../audio/100000.mp3" },
      ];

      // Koordinat pemotongan CSS background (0=Kiri, 1=Tengah, 2=Kanan)
      const skemaPotongan = [
        { id: "piece-0", order: 0, bgPos: "0px 0px" },
        { id: "piece-1", order: 1, bgPos: "-180px 0px" },
        { id: "piece-2", order: 2, bgPos: "-360px 0px" },
      ];

      function FisherYatesShuffle(array) {
        let cur = array.length,
          rand;
        while (cur != 0) {
          rand = Math.floor(Math.random() * cur);
          cur--;
          [array[cur], array[rand]] = [array[rand], array[cur]];
        }
        return array;
      }

      function playSuara(path) {
        if (audioMisi) {
          audioMisi.pause();
          audioMisi.currentTime = 0;
        }
        audioMisi = new Audio(path);
        audioMisi.play().catch((e) => console.log("Audio diblokir browser"));
      }

      function dengarPetunjukAwal() {
        audioInstruksiAwal.play().catch((e) => console.log("User interact needed"));
      }

      function mulaiGame() {
        document.getElementById("welcomePopup").style.display = "none";
        audioInstruksiAwal.pause();
        audioInstruksiAwal.currentTime = 0;

        // Kocok daftar uang dari bank data agar urutan soal bervariasi setiap dimainkan
        bankUangLevel1 = FisherYatesShuffle([...datasetUangLengkap]);
        indeksSoalSekarang = 0;

        muatTantanganUang();
      }

      function muatTantanganUang() {
        totalSuksesKepingan = 0;
        const uangAktif = bankUangLevel1[indeksSoalSekarang];

        // Update Text Progress
        document.getElementById("progressText").innerText = `Uang Ke: ${indeksSoalSekarang + 1} / ${bankUangLevel1.length}`;

        // Reset Tampilan Slot Dropzone
        const slots = document.querySelectorAll(".puzzle-slot");
        slots.forEach((slot) => {
          slot.innerHTML = "";
          slot.addEventListener("dragover", (e) => e.preventDefault());
          slot.addEventListener("dragenter", (e) => e.currentTarget.classList.add("drag-over"));
          slot.addEventListener("dragleave", (e) => e.currentTarget.classList.remove("drag-over"));
          slot.addEventListener("drop", handleDropPiece);
        });

        // Render Potongan Acak baru ke kontainer bawah
        const container = document.getElementById("piecesContainer");
        container.innerHTML = "";

        const kepinganAcak = [...skemaPotongan].sort(() => Math.random() - 0.5);
        kepinganAcak.forEach((data) => {
          const piece = document.createElement("div");
          piece.className = "puzzle-piece";
          piece.id = data.id;
          piece.draggable = true;
          piece.style.backgroundImage = `url('${uangAktif.img}')`;
          piece.style.backgroundPosition = data.bgPos;
          piece.dataset.order = data.order;

          piece.addEventListener("dragstart", (e) => {
            draggedPieceId = e.target.id;
            e.dataTransfer.setData("text/plain", e.target.id);
          });

          container.appendChild(piece);
        });

        // Suarakan instruksi nominal uang yang sedang aktif dibetulkan
        if (uangAktif.audio) {
          playSuara(uangAktif.audio);
        }
      }

      function handleDropPiece(e) {
        e.preventDefault();
        const slot = e.currentTarget;
        slot.classList.remove("drag-over");

        if (slot.children.length > 0) return;

        const piece = document.getElementById(draggedPieceId);
        const slotOrder = slot.getAttribute("data-order");
        const pieceOrder = piece.getAttribute("data-order");

        if (slotOrder === pieceOrder) {
          slot.appendChild(piece);
          piece.draggable = false;
          piece.style.border = "none";
          piece.style.boxShadow = "none";

          playSuara("../audio/bayar.mp3");
          totalSuksesKepingan++;

          // Jika kepingan uang beres disusun seluruhnya (3 bagian)
          if (totalSuksesKepingan === 3) {
            setTimeout(() => {
              prosesPenyelesaianSoal();
            }, 500);
          }
        } else {
          playSuara("../audio/salah2.mp3");
        }
      }

      function prosesPenyelesaianSoal() {
        const uangAktif = bankUangLevel1[indeksSoalSekarang];
        playSuara("../audio/menang2.mp3");

        // Cek apakah ini soal terakhir dari barisan bank uang
        if (indeksSoalSekarang === bankUangLevel1.length - 1) {
          document.getElementById("successTitle").innerText = "🎉 SEMUA SELESAI!";
          document.getElementById("successMessage").innerHTML = `Hebat sekali! Kamu berhasil menyusun seluruh pecahan uang dari Rp 1.000 hingga Rp 100.000!`;
          document.getElementById("actionPopupBtn").innerText = "Soal Berikutnya Yang Lebih Seru!";
          document.getElementById("actionPopupBtn").setAttribute("onclick", "lanjutKeLevelDua()");
        } else {
          document.getElementById("successTitle").innerText = "✨ HEBAT SEKALI!";
          document.getElementById("successMessage").innerHTML = `Hore! Kamu berhasil menyatukan uang **${uangAktif.teks}** dengan sempurna!`;
          document.getElementById("actionPopupBtn").innerText = "SOAL BERIKUTNYA ➡️";
          document.getElementById("actionPopupBtn").setAttribute("onclick", "lanjutSoalBerikutnya()");
        }

        document.getElementById("successPopup").style.display = "flex";
      }

      function lanjutSoalBerikutnya() {
        document.getElementById("successPopup").style.display = "none";
        indeksSoalSekarang++;
        muatTantanganUang();
      }

      function lanjutKeLevelDua() {
        window.location.href = "DragDrop-Uang.html";
      }
    </script>
  </body>
</html>
