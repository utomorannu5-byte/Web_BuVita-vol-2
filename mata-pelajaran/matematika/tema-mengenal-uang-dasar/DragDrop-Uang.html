<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matematika Basic: DragDrop Uang - BuVita EduPlay</title>
    <link rel="stylesheet" href="../../../style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />

    <style>
      body {
        background-image: radial-gradient(#333333 15%, transparent 16%);
        background-size: 16px 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .game-container {
        width: 100%;
        max-width: 900px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .header {
        background-color: #caa011;
        color: black;
        padding: 20px;
        border-radius: 12px;
        border: 3px solid black;
        box-shadow: 5px 5px 0px black;
        text-align: center;
        font-weight: 900;
        margin-bottom: 30px;
        width: 100%;
        cursor: pointer;
      }

      /* Area Uang yang akan di-drag */
      .drag-area {
        background-color: #1e1e1e;
        border: 3px dashed #f1b811;
        border-radius: 15px;
        padding: 25px;
        width: 100%;
        max-width: 400px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 40px;
        min-height: 200px;
        box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.3);
      }

      .source-uang {
        width: 100%;
        max-width: 280px;
        height: auto;
        cursor: grab;
        border: 3px solid black;
        border-radius: 10px;
        transition: transform 0.2s;
      }

      .source-uang:active {
        cursor: grabbing;
        transform: scale(0.95);
      }

      /* Grid Kotak Dropzone */
      .drop-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 25px;
        width: 100%;
        margin-bottom: 30px;
      }

      .dropzone-box {
        background-color: #f0f0f0;
        border: 3px solid black;
        border-radius: 15px;
        padding: 30px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 150px;
        box-shadow: 5px 5px 0px black;
        transition:
          background-color 0.2s,
          transform 0.2s;
      }

      /* Feedback visual saat objek diseret di atas kotak */
      .dropzone-box.drag-hover {
        background-color: #f1b811;
        transform: scale(1.03);
      }

      .dropzone-box p {
        color: black;
        font-weight: 900;
        font-size: 1.5rem;
        pointer-events: none; /* Mencegah gangguan event drag */
      }

      .controls-area {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-top: 20px;
      }

      .btn-action {
        padding: 15px 40px;
        background-color: #2ecc71;
        color: white;
        border: 3px solid black;
        border-radius: 10px;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 5px 5px 0px black;
        font-size: 1.1rem;
        transition:
          transform 0.1s,
          box-shadow 0.1s;
        text-decoration: none;
        text-align: center;
      }

      .btn-action:active {
        transform: translate(3px, 3px);
        box-shadow: 1px 1px 0px black;
      }

      #nextGameBtn {
        background-color: #e67e22;
        display: none; /* Muncul hanya jika sukses memasukkan ke target */
      }

      /* Styling Pop-up Sukses */
      .popup-overlay-global {
        display: none; /* Sembunyi secara default */
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        z-index: 9999;
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(5px);
      }

      .popup-content-box {
        background-color: #1e1e1e;
        border: 4px solid #2ecc71;
        border-radius: 24px;
        padding: 40px;
        text-align: center;
        max-width: 450px;
        width: 90%;
        box-shadow: 0px 0px 30px rgba(46, 204, 113, 0.3);
        animation: zoomInPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .popup-icon-circle {
        font-size: 5rem;
        margin-bottom: 20px;
        animation: bouncePop 1s infinite;
      }

      .popup-title {
        font-family: "Fredoka One", sans-serif;
        color: #2ecc71;
        font-size: 2.5rem;
        margin-bottom: 10px;
      }

      .popup-text {
        font-family: "Nunito", sans-serif;
        color: white;
        font-size: 1.2rem;
        margin-bottom: 30px;
        line-height: 1.4;
      }

      .popup-btn-next {
        background-color: #f1b811;
        color: black;
        font-family: "Fredoka One", sans-serif;
        padding: 15px 30px;
        font-size: 1.3rem;
        border: 3px solid black;
        border-radius: 15px;
        box-shadow: 5px 5px 0px black;
        cursor: pointer;
        transition: 0.2s;
      }

      .popup-btn-next:hover {
        transform: scale(1.05);
        background-color: #ffc107;
      }

      @keyframes zoomInPop {
        from {
          transform: scale(0.5);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      @keyframes bouncePop {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-15px);
        }
      }
    </style>
  </head>
  <body>
    <header class="main-header" style="width: 100%">
      <div class="logo-area">
        <img src="../../../assets/LogoFull.png" class="logo-icon" alt="Logo" />
        <span class="logo-text"><span class="text-white">BuVita</span> <span class="text-yellow">EduPlay</span></span>
      </div>
      <nav class="nav-menu">
        <a href="../../../index.html" class="nav-item">HOME</a>
        <a href="../../../games.html" class="nav-item active">GAMES</a>
        <a href="../../../kategori.html" class="nav-item">KATEGORI</a>
        <a href="../../../aboutUs.html" class="nav-item">TENTANG KAMI</a>
      </nav>
      <div class="header-actions">
        <button class="action-btn">🔍</button>
        <button class="action-btn">🌐</button>
      </div>
    </header>

    <div class="game-container">
      <div class="header" onclick="playIntro()">📢 Ayoo, Geser Uang ke Kotak Nominal yang Benar! 🌟</div>

      <div class="drag-area">
        <img src="" id="targetUangImg" class="source-uang" draggable="true" alt="Uang Belajar" />
      </div>

      <div class="drop-grid" id="dropGrid"></div>

      <div class="controls-area">
        <button class="btn-action" id="resetBtn" onclick="mulaiTantanganBaru()">🔄 Acak Uang Baru</button>
        <a href="TarikGaris-UangNominal.html" class="btn-action" id="nextGameBtn">🎯 Lanjut ke Level Berikutnya!</a>
      </div>
    </div>

    <div id="successPopup" class="popup-overlay-global">
      <div class="popup-content-box">
        <div class="popup-icon-circle">🌟</div>
        <h2 class="popup-title">HEBAT!</h2>
        <p id="popupMessageBenar" class="popup-text"></p>
        <button class="popup-btn-next" onclick="tutupDanLanjutSoal()">Lanjutkan Soal</button>
      </div>
    </div>

    <div id="failedPopup" class="popup-overlay-global">
      <div class="popup-content-box" style="border-color: #e74c3c; box-shadow: 0px 0px 30px rgba(231, 76, 60, 0.3)">
        <div class="popup-icon-circle" style="animation: shakePop 0.5s ease-in-out">⚠️</div>
        <h2 class="popup-title" style="color: #e74c3c">Kurang Tepat!</h2>
        <p id="popupMessageSalah" class="popup-text"></p>
        <button class="popup-btn-next" onclick="tutupDanUlangiSoal()">Coba Lagi</button>
      </div>
    </div>

    <script>
      let currentAudio = null;
      let isPlaying = false;

      let targetUangSiswa = null;

      // Dataset utama bank uang lengkap
      const bankUang = [
        { nominal: 1000, teks: "Seribu Rupiah", img: "../assets/uang1000.png" },
        { nominal: 2000, teks: "Dua Ribu Rupiah", img: "../assets/uang2000.png" },
        { nominal: 5000, teks: "Lima Ribu Rupiah", img: "../assets/uang5000.png" },
        { nominal: 10000, teks: "Sepuluh Ribu Rupiah", img: "../assets/uang10000.png" },
        { nominal: 20000, teks: "Dua Puluh Ribu Rupiah", img: "../assets/uang20000.png" },
        { nominal: 50000, teks: "Lima Puluh Ribu Rupiah", img: "../assets/uang50000.png" },
        { nominal: 100000, teks: "Seratus Ribu Rupiah", img: "../assets/uang100000.png" },
      ];

      // Fisher-Yates Shuffle
      function shuffle(array) {
        let currentIndex = array.length,
          randomIndex;
        while (currentIndex != 0) {
          randomIndex = Math.floor(Math.random() * currentIndex);
          currentIndex--;
          [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
      }

      function playSuara(path) {
        if (isPlaying) return;
        isPlaying = true;
        currentAudio = new Audio(path);
        currentAudio
          .play()
          .then(() => {
            currentAudio.onended = function () {
              isPlaying = false;
              currentAudio = null;
            };
          })
          .catch((e) => {
            console.log("Audio diblokir browser atau error:", e);
            isPlaying = false;
          });
      }

      function playIntro() {
        playSuara("../audio/judulDragDrop.mp3");
      }

      function mulaiTantanganBaru() {
        // Sembunyikan tombol lanjut game terlebih dahulu
        document.getElementById("nextGameBtn").style.display = "none";

        // Kocok bank data uang untuk memilih target utama
        const salinanBank = shuffle([...bankUang]);
        targetUangSiswa = salinanBank[0];

        // Pasang gambar uang target di atas
        const imgElement = document.getElementById("targetUangImg");
        imgElement.src = targetUangSiswa.img;
        imgElement.style.opacity = "1";

        // Ambil 2 uang lain sebagai pengecoh untuk dropzone
        const pilihanDropzone = [targetUangSiswa, salinanBank[1], salinanBank[2]];
        // Kocok urutan dropzone agar posisi nominal benar tidak selalu di kiri
        shuffle(pilihanDropzone);

        // Render kotak dropzone ke HTML
        const grid = document.getElementById("dropGrid");
        grid.innerHTML = "";

        pilihanDropzone.forEach((uang) => {
          const box = document.createElement("div");
          box.className = "dropzone-box";
          box.dataset.nominal = uang.nominal; // Ikat data nominal ke atribut elemen
          box.innerHTML = `<p>Rp ${uang.nominal.toLocaleString("id-ID")}</p>`;

          // Tempelkan event handler HTML5 Drag & Drop
          box.addEventListener("dragover", handleDragOver);
          box.addEventListener("dragenter", handleDragEnter);
          box.addEventListener("dragleave", handleDragLeave);
          box.addEventListener("drop", handleDrop);

          grid.appendChild(box);
        });
      }

      // --- HANDLER DRAG & DROP LOGIC ---
      function handleDragOver(e) {
        e.preventDefault(); // Diwajibkan agar drop diizinkan
        return false;
      }

      function handleDragEnter(e) {
        this.classList.add("drag-hover");
      }

      function handleDragLeave(e) {
        this.classList.remove("drag-hover");
      }

      function handleDrop(e) {
        e.preventDefault();
        this.classList.remove("drag-hover");

        const nominalKotak = parseInt(this.dataset.nominal);

        // Validasi apakah uang ditaruh di kotak yang tepat
        if (nominalKotak === targetUangSiswa.nominal) {
          playSuara("../audio/menang2.mp3");
          tampilkanPopUpBerhasil("Pilihanmu Tepat Sekali.");

          // Efek visual sukses
          document.getElementById("targetUangImg").style.opacity = "0.3";
          document.getElementById("nextGameBtn").style.display = "block";
        } else {
          playSuara("../audio/salah2.mp3");
          tampilkanPopUpGagal("Pilih Lagi Jawaban yang Benar.");
        }
      }

      function tampilkanPopUpBerhasil(pesan) {
        document.getElementById("popupMessageBenar").innerHTML = pesan;
        document.getElementById("successPopup").style.display = "flex";
      }

      function tutupDanLanjutSoal() {
        document.getElementById("successPopup").style.display = "none";
      }

      function tampilkanPopUpGagal(pesan) {
        document.getElementById("popupMessageSalah").innerHTML = pesan;
        document.getElementById("failedPopup").style.display = "flex";
      }

      function tutupDanUlangiSoal() {
        document.getElementById("failedPopup").style.display = "none";
      }

      // Setup awal saat game dibuka pertama kali
      document.addEventListener("DOMContentLoaded", () => {
        mulaiTantanganBaru();

        // Pasangkan data transfer standard untuk pergerakan gambar
        document.getElementById("targetUangImg").addEventListener("dragstart", function (e) {
          e.dataTransfer.setData("text/plain", ""); // Diperlukan bagi beberapa browser lama/Firefox
        });
      });
    </script>
  </body>
</html>
