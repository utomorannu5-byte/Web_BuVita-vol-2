<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matematika Menengah: Pesta Pizza - BuVita EduPlay</title>
    <link rel="stylesheet" href="../../../style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
      body {
        background-image: radial-gradient(#333333 15%, transparent 16%);
        background-size: 16px 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .game-container {
        width: 100%;
        max-width: 900px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .game-header {
        background-color: #e67e22;
        color: white;
        padding: 15px 30px;
        border-radius: 12px;
        border: 3px solid black;
        box-shadow: 5px 5px 0px black;
        font-family: "Fredoka One", sans-serif;
        font-size: 1.8rem;
        margin-bottom: 25px;
        text-align: center;
        width: 100%;
        cursor: pointer;
      }
      .pesta-layout {
        display: grid;
        grid-template-columns: 1fr 1.2fr 1fr;
        gap: 15px;
        width: 100%;
        align-items: center;
        margin-bottom: 25px;
      }
      @media (max-width: 768px) {
        .pesta-layout {
          grid-template-columns: 1fr;
        }
      }
      /* ANAK / KARAKTER */
      .anak-card {
        background-color: #1e1e1e;
        border: 3px solid black;
        border-radius: 16px;
        padding: 15px;
        box-shadow: 5px 5px 0px black;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .anak-avatar {
        font-size: 4rem;
        margin-bottom: 5px;
      }
      .anak-name {
        font-family: "Fredoka One", sans-serif;
        color: #f1b811;
        margin-bottom: 10px;
      }
      /* MEJA TENGAH PIZZA */
      .meja-pizza-zone {
        background-color: #2c3e50;
        border: 4px solid black;
        border-radius: 20px;
        padding: 20px;
        box-shadow: 6px 6px 0px black;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .pizza-emoji {
        font-size: 5.5rem;
        margin: 10px 0;
        animation: pulse 2s infinite;
      }
      .harga-tag-pizza {
        background-color: #e74c3c;
        color: white;
        font-family: "Fredoka One", sans-serif;
        font-size: 1.3rem;
        padding: 5px 15px;
        border: 2px solid black;
        border-radius: 8px;
        margin-bottom: 15px;
      }
      .dompet-pilihan {
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: 100%;
      }
      .uang-btn-pesta {
        background: none;
        border: none;
        cursor: pointer;
        transition: transform 0.1s;
        padding: 0;
        width: 110px;
      }
      .uang-btn-pesta:hover {
        transform: scale(1.05);
      }
      .uang-btn-pesta img {
        width: 100%;
        border: 2px solid black;
        border-radius: 6px;
        box-shadow: 2px 2px 0px black;
      }
      .uang-btn-pesta.terpilih img {
        border-color: #2ecc71;
        box-shadow: 0px 0px 10px #2ecc71;
        transform: translateY(-4px);
      }
      .papan-kalkulasi-total {
        background-color: #111;
        border-radius: 8px;
        padding: 10px;
        width: 100%;
        color: #2ecc71;
        font-family: "Fredoka One", sans-serif;
        font-size: 1.1rem;
        margin-top: 10px;
      }
      .btn-gabung {
        background-color: #2ecc71;
        color: white;
        font-family: "Fredoka One", sans-serif;
        padding: 10px 20px;
        font-size: 1.2rem;
        border: 3px solid black;
        border-radius: 10px;
        box-shadow: 3px 3px 0px black;
        cursor: pointer;
        margin-top: 15px;
        width: 100%;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }

      /* Styling Pop-up Sukses */
      .popup-overlay-global {
        display: none; /* Sembunyi secara default */
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        z-index: 9999;
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(5px);
      }

      .popup-content-box {
        background-color: #1e1e1e;
        border: 4px solid #2ecc71;
        border-radius: 24px;
        padding: 40px;
        text-align: center;
        max-width: 450px;
        width: 90%;
        box-shadow: 0px 0px 30px rgba(46, 204, 113, 0.3);
        animation: zoomInPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .popup-icon-circle {
        font-size: 5rem;
        margin-bottom: 20px;
        animation: bouncePop 1s infinite;
      }

      .popup-title {
        font-family: "Fredoka One", sans-serif;
        color: #2ecc71;
        font-size: 2.5rem;
        margin-bottom: 10px;
      }

      .popup-text {
        font-family: "Nunito", sans-serif;
        color: white;
        font-size: 1.2rem;
        margin-bottom: 30px;
        line-height: 1.4;
      }

      .popup-btn-next {
        background-color: #f1b811;
        color: black;
        font-family: "Fredoka One", sans-serif;
        padding: 15px 30px;
        font-size: 1.3rem;
        border: 3px solid black;
        border-radius: 15px;
        box-shadow: 5px 5px 0px black;
        cursor: pointer;
        transition: 0.2s;
      }

      .popup-btn-next:hover {
        transform: scale(1.05);
        background-color: #ffc107;
      }

      @keyframes zoomInPop {
        from {
          transform: scale(0.5);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      @keyframes bouncePop {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-15px);
        }
      }

      /* Efek Animasi Guncang untuk Pop-up Salah */
      @keyframes shakePop {
        0%,
        100% {
          transform: translateX(0);
        }
        20%,
        60% {
          transform: translateX(-10px);
        }
        40%,
        80% {
          transform: translateX(10px);
        }
      }

      /* Styling Tombol Navigasi Bawah */
      .navigasi-level-box {
        display: flex;
        justify-content: space-between;
        width: 100%;
        max-width: 900px;
        margin-top: 40px;
        margin-bottom: 20px;
        gap: 20px;
      }

      .btn-nav-level {
        flex: 1;
        font-family: "Fredoka One", sans-serif;
        font-size: 1.1rem;
        padding: 15px 20px;
        border: 3px solid black;
        border-radius: 12px;
        cursor: pointer;
        box-shadow: 4px 4px 0px black;
        transition:
          transform 0.1s,
          box-shadow 0.1s;
        color: white;
      }

      .btn-nav-level:active {
        transform: translate(3px, 3px);
        box-shadow: 1px 1px 0px black;
      }

      /* Warna Tombol Back (Merah Tua/Retro) */
      .btn-nav-level.btn-back {
        background-color: #95a5a6;
        color: black;
      }
      .btn-nav-level.btn-back:hover {
        background-color: #bdc3c7;
      }

      /* Warna Tombol Next (Biru/Ungu Retro) */
      .btn-nav-level.btn-next {
        background-color: #9b59b6;
      }
      .btn-nav-level.btn-next:hover {
        background-color: #8e44ad;
      }

      @media (max-width: 480px) {
        .navigasi-level-box {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <header class="main-header" style="width: 100%">
      <div class="logo-area">
        <img src="../../../assets/LogoFull.png" class="logo-icon" alt="BuVita Logo" />
        <span class="logo-text"><span class="text-white">BuVita</span> <span class="text-yellow">EduPlay</span></span>
      </div>
      <nav class="nav-menu">
        <a href="../../../index.html" class="nav-item">HOME</a>
        <a href="../../../games.html" class="nav-item active">GAMES</a>
        <a href="../../../kategori.html" class="nav-item">KATEGORI</a>
        <a href="../../../aboutUs.html" class="nav-item">TENTANG KAMI</a>
      </nav>
    </header>

    <div class="game-container">
      <div class="game-header" onclick="putarSuaraSoal()">🍕 Pesta Pizza Patungan 🔊</div>

      <div class="pesta-layout">
        <div class="anak-card">
          <div class="anak-avatar">👦</div>
          <div class="anak-name">Budi</div>
          <div class="dompet-pilihan" id="dompetBudi"></div>
        </div>

        <div class="meja-pizza-zone">
          <div class="harga-tag-pizza" id="hargaPizzaTeks">Harga Pizza: Rp 0</div>
          <div class="pizza-emoji">🍕</div>

          <div class="papan-kalkulasi-total">
            <div>Uang Budi + Uang Siti</div>
            <div id="teksKalkulasiHitung" style="color: white; margin-top: 5px">Rp 0 + Rp 0</div>
            <div id="teksTotalGabungan" style="margin-top: 5px; font-size: 1.3rem">Total: Rp 0</div>
          </div>

          <button class="btn-gabung" onclick="validasiPatunganPizza()">🍕 PATUNGAN & BELI</button>
        </div>

        <div class="anak-card">
          <div class="anak-avatar">👧</div>
          <div class="anak-name">Siti</div>
          <div class="dompet-pilihan" id="dompetSiti"></div>
        </div>
      </div>

      <div class="navigasi-level-box">
        <button class="btn-nav-level btn-back" onclick="navigasiKembali()">⬅️ GAME SEBELUMNYA</button>
        <button class="btn-nav-level btn-next" onclick="navigasiLanjut()">SELESAI ➡️</button>
      </div>

      <div id="successPopup" class="popup-overlay-global">
        <div class="popup-content-box">
          <div class="popup-icon-circle">🌟</div>
          <h2 class="popup-title">HOREEE!</h2>
          <p id="popupMessageBenar" class="popup-text"></p>
          <button class="popup-btn-next" onclick="tutupDanLanjutSoal()">SOAL BERIKUTNYA ✨</button>
        </div>
      </div>

      <div id="failedPopup" class="popup-overlay-global">
        <div class="popup-content-box" style="border-color: #e74c3c; box-shadow: 0px 0px 30px rgba(231, 76, 60, 0.3)">
          <div class="popup-icon-circle" style="animation: shakePop 0.5s ease-in-out">⚠️</div>
          <h2 class="popup-title" style="color: #e74c3c"></h2>
          <p id="popupMessageSalah" class="popup-text"></p>
          <button class="popup-btn-next" onclick="tutupDanUlangiSoal()">Coba Lagi</button>
        </div>
      </div>
    </div>

    <script>
      const masterGambarUang = {
        1000: "../assets/uang1000.png",
        2000: "../assets/uang2000.png",
        5000: "../assets/uang5000.png",
        10000: "../assets/uang10000.png",
      };

      // Bank Soal Target Harga Pizza & kombinasi dompet anak
      const bankSoalPizza = [
        { harga: 3000, opsiBudi: [1000, 2000], opsiSiti: [1000, 2000] },
        { harga: 4000, opsiBudi: [2000, 5000], opsiSiti: [1000, 2000] },
        { harga: 6000, opsiBudi: [1000, 5000], opsiSiti: [1000, 2000] },
        { harga: 7000, opsiBudi: [2000, 5000], opsiSiti: [2000, 5000] },
        { harga: 12000, opsiBudi: [2000, 10000], opsiSiti: [2000, 5000] },
      ];

      let soalSekarang = null;
      let uangTerpilihBudi = 0;
      let uangTerpilihSiti = 0;

      function mulaiPestaBaru() {
        uangTerpilihBudi = 0;
        uangTerpilihSiti = 0;

        // Acak soal
        soalSekarang = bankSoalPizza[Math.floor(Math.random() * bankSoalPizza.length)];

        document.getElementById("hargaPizzaTeks").innerText = "Harga Pizza: Rp " + soalSekarang.harga.toLocaleString("id-ID");
        updatePapanHitungUI();

        // Render Uang Budi
        const wadahBudi = document.getElementById("dompetBudi");
        wadahBudi.innerHTML = "";
        soalSoalRender(soalSekarang.opsiBudi, wadahBudi, "budi");

        // Render Uang Siti
        const wadahSiti = document.getElementById("dompetSiti");
        wadahSiti.innerHTML = "";
        soalSoalRender(soalSekarang.opsiSiti, wadahSiti, "siti");
      }

      function soalSoalRender(arrayOpsi, wadahElemen, pemilik) {
        arrayOpsi.forEach((nominal, idx) => {
          const btn = document.createElement("button");
          btn.className = "uang-btn-pesta";
          btn.id = `btn-${pemilik}-${idx}`;
          btn.onclick = () => pilihUangAnak(nominal, pemilik, `btn-${pemilik}-${idx}`, arrayOpsi.length);
          btn.innerHTML = `<img src="${masterGambarUang[nominal]}">`;
          wadahElemen.appendChild(btn);
        });
      }

      function pilihUangAnak(nominal, pemilik, idTombol, totalOpsi) {
        // Hapus kelas terpilih dari opsi dompet anak ini terlebih dahulu (sistem radio button ramah anak)
        for (let i = 0; i < totalOpsi; i++) {
          let t = document.getElementById(`btn-${pemilik}-${i}`);
          if (t) t.classList.remove("terpilih");
        }

        // Pilih uang baru
        document.getElementById(idTombol).classList.add("terpilih");

        if (pemilik === "budi") {
          uangTerpilihBudi = nominal;
        } else {
          uangTerpilihSiti = nominal;
        }

        let audioTap = new Audio("../audio/bayar.mp3");
        audioTap.play().catch((e) => {});

        updatePapanHitungUI();
      }

      function updatePapanHitungUI() {
        document.getElementById("teksKalkulasiHitung").innerText = `Rp ${uangTerpilihBudi.toLocaleString("id-ID")} + Rp ${uangTerpilihSiti.toLocaleString("id-ID")}`;
        let total = uangTerpilihBudi + uangTerpilihSiti;
        document.getElementById("teksTotalGabungan").innerText = "Total: Rp " + total.toLocaleString("id-ID");
      }

      function putarSuaraSoal() {
        let audio = new Audio("../audio/judulPatungan.mp3");
        audio.play().catch((e) => console.log("Audio pizza belum disiapkan"));
      }

      function validasiPatunganPizza() {
        let totalGabungan = uangTerpilihBudi + uangTerpilihSiti;

        if (uangTerpilihBudi === 0 || uangTerpilihSiti === 0) {
          let audioSalah = new Audio("../audio/salah2.mp3");
          audioSalah.play().catch((e) => {});
          tampilkanPopUpGagal("⚠️ Pilih uang dari Budi DAN uang dari Siti dulu untuk patungan ya!");
          return;
        }

        if (totalGabungan === soalSekarang.harga) {
          let audioBenar = new Audio("../audio/menang2.mp3");
          audioBenar.play().catch((e) => {});
          tampilkanPopUpBerhasil(`🎉 Patungan BERHASIL! Uang Budi & Siti PAS senilai Rp ${soalSekarang.harga.toLocaleString("id-ID")}. Selamat makan pizza bersama! 🍕✨`);
          mulaiPestaBaru();
        } else {
          let audioSalah = new Audio("../audio/salah2.mp3");
          audioSalah.play().catch((e) => {});
          tampilkanPopUpGagal("Wah, kombinasi uang patungannya belum pas dengan harga pizza. Yuk coba pilih lembaran uang lainnya!");
        }
      }

      function tampilkanPopUpBerhasil(pesan) {
        document.getElementById("popupMessageBenar").innerHTML = pesan;
        document.getElementById("successPopup").style.display = "flex";
      }

      document.addEventListener("DOMContentLoaded", () => {
        mulaiPestaBaru();
      });

      function tutupDanLanjutSoal() {
        document.getElementById("successPopup").style.display = "none";
        mulaiPestaBaru();
      }

      document.addEventListener("DOMContentLoaded", () => {
        mulaiPestaBaru();
      });

      function tampilkanPopUpGagal(pesan) {
        document.getElementById("popupMessageSalah").innerHTML = pesan;
        document.getElementById("failedPopup").style.display = "flex";
      }

      function tutupDanUlangiSoal() {
        document.getElementById("failedPopup").style.display = "none";
        mulaiPestaBaru();
      }

      // Fungsi BARU: Menutup popup salah agar siswa bisa mencoba kembali
      function tutupDanUlangiSoal() {
        document.getElementById("failedPopup").style.display = "none";
        // Tidak memanggil mulaiKiosBaru() agar susunan uang di meja tidak hilang,
        // sehingga anak tinggal menambah/mengurangi uang yang salah tadi.
      }

      // --- CONFIGURASI UTURAN GAME LEVEL MENENGAH ---
      const urutanGameMenengah = ["KiosJajanan.html", "CelenganAjaib.html", "TebakDompet.html", "MesinKasir.html", "PestaPizza.html"];

      function dapatkanIndexGameSekarang() {
        // Mengambil nama file HTML yang sedang aktif saat ini
        const path = window.location.pathname;
        const namaFile = path.substring(path.lastIndexOf("/") + 1);
        return urutanGameMenengah.indexOf(namaFile);
      }

      function navigasiLanjut() {
        const currentIndex = dapatkanIndexGameSekarang();

        if (currentIndex !== -1 && currentIndex < urutanGameMenengah.length - 1) {
          // Jika masih ada game berikutnya, pergi ke file tersebut
          window.location.href = urutanGameMenengah[currentIndex + 1];
        } else {
          // Jika sudah di game terakhir (Pesta Pizza), arahkan kembali ke katalog utama
          alert("🎉 Hebat! Kamu sudah menyelesaikan semua game di Level Menengah! Yuk kembali ke halaman utama.");
          window.location.href = "../../../games.html";
        }
      }

      function navigasiKembali() {
        const currentIndex = dapatkanIndexGameSekarang();

        if (currentIndex > 0) {
          // Jika ada game sebelumnya, mundur 1 game
          window.location.href = urutanGameMenengah[currentIndex - 1];
        } else {
          // Jika di game pertama (Kios Jajanan), balik ke katalog utama
          window.location.href = "../../../games.html";
        }
      }
    </script>
  </body>
</html>
