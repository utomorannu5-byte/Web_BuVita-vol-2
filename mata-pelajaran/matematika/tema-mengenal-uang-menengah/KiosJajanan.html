<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Matematika Menengah: Kios Jajanan - BuVita EduPlay</title>
    <link rel="stylesheet" href="../../../style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
      body {
        background-color: #121214;
        background-image: radial-gradient(#252529 15%, transparent 16%);
        background-size: 20px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        user-select: none;
        font-family: "Nunito", sans-serif;
        margin: 0;
        padding: 0;
      }
      .game-container {
        width: 100%;
        max-width: 900px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-sizing: border-box;
      }
      .kios-header {
        background: linear-gradient(135deg, #eb598a, #6c5ce7);
        color: white;
        padding: 15px 30px;
        border-radius: 20px;
        border: 4px solid #000;
        box-shadow: 6px 6px 0px #000;
        font-family: "Fredoka One", sans-serif;
        font-size: 1.8rem;
        margin-bottom: 25px;
        text-align: center;
        width: 100%;
        box-sizing: border-box;
        cursor: pointer;
      }
      .kios-display-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 25px;
        width: 100%;
        margin-bottom: 25px;
        box-sizing: border-box;
      }
      @media (max-width: 768px) {
        .kios-display-grid {
          grid-template-columns: 1fr;
        }
      }
      .item-board,
      .kasir-table {
        background-color: #1c1b22;
        border: 4px solid black;
        border-radius: 24px;
        padding: 20px;
        box-shadow: 6px 6px 0px black;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 270px;
        box-sizing: border-box;
      }
      .item-gambar-box {
        height: 110px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 10px;
      }
      .item-gambar {
        width: 100px;
        height: auto;
        animation: bounce 2s infinite;
      }
      .price-tag {
        background-color: #f1b811;
        color: black;
        font-family: "Fredoka One", sans-serif;
        font-size: 1.5rem;
        padding: 5px 20px;
        border: 3px solid black;
        border-radius: 12px;
        box-shadow: 3px 3px 0px #000;
      }
      .kasir-table {
        border: 4px dashed #caa011;
        background-color: #111014;
        box-shadow:
          inset 0px 4px 10px rgba(0, 0, 0, 0.7),
          6px 6px 0px black;
      }
      .kasir-table.drag-hover {
        background-color: #1a1921;
        border-color: #eb598a;
      }
      .table-title {
        font-family: "Fredoka One", sans-serif;
        color: #caa011;
        margin-bottom: 15px;
      }
      .uang-di-meja-container {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        min-height: 100px;
        width: 100%;
      }
      .dompet-section {
        background-color: #1c1b22;
        border: 4px solid black;
        border-radius: 24px;
        padding: 20px;
        width: 100%;
        box-shadow: 6px 6px 0px black;
        text-align: center;
        box-sizing: border-box;
      }
      .dompet-title {
        font-family: "Fredoka One", sans-serif;
        color: white;
        margin-bottom: 15px;
        font-size: 1.4rem;
      }
      .uang-pilihan-row {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
        min-height: 90px;
        align-items: center;
      }
      .uang-card-clickable {
        width: 130px;
        cursor: grab;
        transition: transform 0.1s;
      }
      .uang-card-clickable:active {
        cursor: grabbing;
      }
      .uang-card-clickable img {
        width: 100%;
        border-radius: 8px;
        border: 3px solid black;
        box-shadow: 4px 4px 0px black;
      }
      .uang-di-meja {
        width: 100px;
        animation: popIn 0.2s ease-out;
        cursor: pointer;
      }
      .uang-di-meja img {
        width: 100%;
        border-radius: 6px;
        border: 2px solid black;
        box-shadow: 2px 2px 0px #000;
      }
      .total-papan {
        margin-top: 15px;
        font-family: "Fredoka One", sans-serif;
        font-weight: 900;
        color: #ffffff;
        font-size: 1.4rem;
        background: #222;
        padding: 5px 15px;
        border-radius: 10px;
        border: 2px solid #000;
      }
      .btn-action-kios {
        background-color: #2ecc71;
        color: white;
        font-family: "Fredoka One", sans-serif;
        padding: 12px 40px;
        font-size: 1.5rem;
        border: 3px solid black;
        border-radius: 15px;
        box-shadow: 4px 4px 0px black;
        cursor: pointer;
        margin-top: 20px;
        display: none;
        transition: 0.1s;
      }
      .btn-action-kios:hover {
        background-color: #27ae60;
        transform: translate(-2px, -2px);
        box-shadow: 6px 6px 0px black;
      }
      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }
      @keyframes popIn {
        0% {
          transform: scale(0);
        }
        100% {
          transform: scale(1);
        }
      }

      /* Pop-up Overlay */
      .popup-overlay-global {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        z-index: 9999;
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(5px);
      }
      .popup-content-box {
        background-color: #1c1b22;
        border: 4px solid #2ecc71;
        border-radius: 24px;
        padding: 40px;
        text-align: center;
        max-width: 450px;
        width: 90%;
        box-shadow: 0px 0px 30px rgba(46, 204, 113, 0.3);
        animation: zoomInPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .popup-icon-circle {
        font-size: 5rem;
        margin-bottom: 20px;
        animation: bouncePop 1s infinite;
      }
      .popup-title {
        font-family: "Fredoka One", sans-serif;
        color: #2ecc71;
        font-size: 2.5rem;
        margin-bottom: 10px;
      }
      .popup-text {
        font-family: "Nunito", sans-serif;
        color: white;
        font-size: 1.2rem;
        margin-bottom: 30px;
        line-height: 1.4;
      }
      .popup-btn-next {
        background-color: #f1b811;
        color: black;
        font-family: "Fredoka One", sans-serif;
        padding: 15px 30px;
        font-size: 1.3rem;
        border: 3px solid black;
        border-radius: 15px;
        box-shadow: 5px 5px 0px black;
        cursor: pointer;
        transition: 0.2s;
      }
      .popup-btn-next:hover {
        transform: scale(1.05);
        background-color: #ffc107;
      }

      @keyframes zoomInPop {
        from {
          transform: scale(0.5);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      @keyframes bouncePop {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-15px);
        }
      }
      @keyframes shakePop {
        0%,
        100% {
          transform: translateX(0);
        }
        20%,
        60% {
          transform: translateX(-10px);
        }
        40%,
        80% {
          transform: translateX(10px);
        }
      }

      /* Navigasi Control Box */
      .navigasi-level-box {
        display: flex;
        justify-content: space-between;
        width: 100%;
        max-width: 900px;
        margin-top: 40px;
        margin-bottom: 20px;
        gap: 20px;
        box-sizing: border-box;
      }
      .btn-nav-level {
        flex: 1;
        font-family: "Fredoka One", sans-serif;
        font-size: 1.1rem;
        padding: 15px 20px;
        border: 3px solid black;
        border-radius: 12px;
        cursor: pointer;
        box-shadow: 4px 4px 0px black;
        transition:
          transform 0.1s,
          box-shadow 0.1s;
        color: white;
      }
      .btn-nav-level:active {
        transform: translate(3px, 3px);
        box-shadow: 1px 1px 0px black;
      }
      .btn-nav-level.btn-back {
        background-color: #95a5a6;
        color: black;
      }
      .btn-nav-level.btn-back:hover {
        background-color: #bdc3c7;
      }
      .btn-nav-level.btn-next {
        background-color: #9b59b6;
      }
      .btn-nav-level.btn-next:hover {
        background-color: #8e44ad;
      }

      @media (max-width: 480px) {
        .navigasi-level-box {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <header class="main-header" style="width: 100%">
      <div class="logo-area">
        <img src="../../../assets/LogoFull.png" class="logo-icon" alt="BuVita Logo" />
        <span class="logo-text"><span class="text-white">BuVita</span> <span class="text-yellow">EduPlay</span></span>
      </div>
      <nav class="nav-menu">
        <a href="../../../index.html" class="nav-item">HOME</a>
        <a href="../../../games.html" class="nav-item active">GAMES</a>
        <a href="../../../kategori.html" class="nav-item">KATEGORI</a>
        <a href="../../../aboutUs.html" class="nav-item">TENTANG KAMI</a>
      </nav>
    </header>

    <div class="game-container">
      <div class="kios-header" id="instruksiSuaraBtn" onclick="putarSuaraSoal()">🍦 Warung Kantin BuVita 🔊</div>

      <div class="kios-display-grid">
        <div class="item-board">
          <div class="item-gambar-box" id="jajanangambar"></div>
          <h3 style="font-family: &quot;Fredoka One&quot;; margin-bottom: 10px; color: white" id="jajananNama">Loading...</h3>
          <div class="price-tag" id="jajananHargaText">Rp 0</div>
        </div>

        <div class="kasir-table" id="dropZoneKasir" ondragover="allowDrop(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)" ondrop="dropUang(event)">
          <h3 class="table-title">🛒 Taruh Uang Di Sini:</h3>
          <div class="uang-di-meja-container" id="wadahUangMeja"></div>
          <div class="total-papan" id="totalPapanTeks">Total Uang: Rp 0</div>
          <p style="font-size: 0.8rem; color: #aaa; margin-top: 5px; font-family: &quot;Nunito&quot;">(Tip: Klik uang di meja jika ingin batal)</p>
        </div>
      </div>

      <div class="dompet-section">
        <h3 class="dompet-title">👛 Ambil Uang Yang Ada di Dompetmu:</h3>
        <div class="uang-pilihan-row" id="wadahDompetUang"></div>
        <button class="btn-action-kios" id="btnBayarSekarang" onclick="validasiPembayaran()">💰 BAYAR SEKARANG</button>
      </div>

      <div class="navigasi-level-box">
        <button class="btn-nav-level btn-back" onclick="navigasiKembali()">⬅️ GAME SEBELUMNYA</button>
        <button class="btn-nav-level btn-next" onclick="navigasiLanjut()">GAME BERIKUTNYA ➡️</button>
      </div>

      <div id="welcomePopup" class="popup-overlay-global" style="display: flex">
        <div class="popup-content-box" style="border-color: #9b59b6; box-shadow: 0px 0px 30px rgba(155, 89, 182, 0.3); max-width: 500px">
          <div class="popup-icon-circle" style="font-size: 4rem; margin-bottom: 10px">Warung Jajanan BuVita</div>

          <h2 class="popup-title" style="color: #9b59b6; font-size: 1.8rem; margin-bottom: 15px">Klik Dibawah ini!</h2>
          <p class="popup-text" style="margin-bottom: 20px"></p>

          <button class="popup-btn-next" style="background-color: #9b59b6; color: white; margin-bottom: 15px; width: 100%; display: block" onclick="dengarPetunjukAwal()">🔊 Dengarkan BuVita Yuk</button>

          <button id="btnMulaiReal" class="popup-btn-next" style="background-color: #2ecc71; color: white; width: 100%; display: block; border-color: #27ae60" onclick="klikMulaiGame()">🎮 LANGSUNG BERMAIN ➡️</button>
        </div>
      </div>

      <div id="successPopup" class="popup-overlay-global">
        <div class="popup-content-box">
          <div class="popup-icon-circle">🌟</div>
          <h2 class="popup-title">HEBAT!</h2>
          <p id="popupMessageBenar" class="popup-text"></p>
          <button class="popup-btn-next" onclick="tutupDanLanjutSoal()">SOAL BERIKUTNYA ✨</button>
        </div>
      </div>

      <div id="failedPopup" class="popup-overlay-global">
        <div class="popup-content-box" style="border-color: #e74c3c; box-shadow: 0px 0px 30px rgba(231, 76, 60, 0.3)">
          <div class="popup-icon-circle" style="animation: shakePop 0.5s ease-in-out">❌</div>
          <h2 class="popup-title" style="color: #e74c3c">UANG BELUM PAS</h2>
          <p id="popupMessageSalah" class="popup-text"></p>
          <button class="popup-btn-next" onclick="tutupDanUlangiSoal()">Coba Lagi</button>
        </div>
      </div>
    </div>

    <script>
      const masterGambarUang = {
        1000: "../assets/uang1000.png",
        2000: "../assets/uang2000.png",
        5000: "../assets/uang5000.png",
        10000: "../assets/uang10000.png",
      };

      const daftarJajanan = [
        { nama: "Es Krim Cone", harga: 3000, gambar: "../../../assets/esKrimCone.png", pecahan: [1000, 2000], audio: "../audio/beli_eskrim.mp3" },
        { nama: "Donat Cokelat", harga: 2000, gambar: "../../../assets/donat.png", pecahan: [1000, 2000], audio: "../audio/beli_donat.mp3" },
        { nama: "Susu Kotak Stroberi", harga: 4000, gambar: "../../../assets/susukotak.png", pecahan: [1000, 2000], audio: "../audio/beli_susu.mp3" },
        { nama: "Burger Lezat", harga: 7000, gambar: "../../../assets/burger.png", pecahan: [1000, 2000, 5000], audio: "../audio/beli_burger.mp3" },
        { nama: "Kentang Goreng", harga: 5000, gambar: "../../../assets/kentang.png", pecahan: [1000, 2000, 5000], audio: "../audio/beli_kentang.mp3" },
        { nama: "Buku Tulis Catatan", harga: 6000, gambar: "../../../assets/buku.png", pecahan: [1000, 2000, 5000], audio: "../audio/beli_buku.mp3" },
        { nama: "Pensil Warna Set", harga: 12000, gambar: "../../../assets/pensil.png", pecahan: [2000, 5000, 10000], audio: "../audio/beli_pensil.mp3" },
        { nama: "Robot Mainan Mini", harga: 15000, gambar: "../../../assets/robot.png", pecahan: [2000, 5000, 10000], audio: "../audio/beli_robot.mp3" },
      ];

      let soalSekarang = null;
      let totalUangDiMeja = 0;
      let arrayUangDiMeja = [];

      // 🔥 UTAMA: Definisikan objek audio instruksi awal secara global agar bisa di-stop dari fungsi lain
      let audioInstruksiAwal = new Audio("../audio/judulWarung.mp3");
      let gameBaruBuka = true;

      function mulaiKiosBaru() {
        const acak = Math.floor(Math.random() * daftarJajanan.length);
        soalSekarang = daftarJajanan[acak];

        document.getElementById("jajanangambar").innerHTML = `<img src="${soalSekarang.gambar}" class="item-gambar" alt="${soalSekarang.nama}">`;
        document.getElementById("jajananNama").innerText = soalSekarang.nama;
        document.getElementById("jajananHargaText").innerText = "Rp " + soalSekarang.harga.toLocaleString("id-ID");

        const wadahDompet = document.getElementById("wadahDompetUang");
        wadahDompet.innerHTML = "";

        soalSekarang.pecahan.forEach((nominal) => {
          const itemUang = document.createElement("div");
          itemUang.className = "uang-card-clickable";
          itemUang.setAttribute("draggable", "true");
          itemUang.ondragstart = (e) => dragStart(e, nominal);
          itemUang.onclick = () => tambahUangLewatKlik(nominal);
          itemUang.innerHTML = `<img src="${masterGambarUang[nominal]}" alt="Uang ${nominal}">`;
          wadahDompet.appendChild(itemUang);
        });

        totalUangDiMeja = 0;
        arrayUangDiMeja = [];
        updateUIMejaKasir();
        document.getElementById("btnBayarSekarang").style.display = "none";

        // Suara soal hanya berbunyi otomatis jika bukan pembukaan pertama (sudah klik mulai)
        if (!gameBaruBuka) {
          putarSuaraSoal();
        }
      }

      // 1. Fungsi ketika anak mengklik tombol "DENGAR PETUNJUK GAME"
      function dengarPetunjukAwal() {
        // Karena dipicu oleh klik aktif, browser DIJAMIN 100% membuka blokir audio
        audioInstruksiAwal
          .play()
          .then(() => {
            console.log("Suara instruksi awal berhasil berputar via interaksi user.");

            // Opsional: Begitu suara petunjuk umum habis, otomatis masuk ke game dan putar suara soal
            audioInstruksiAwal.onended = () => {
              klikMulaiGame();
            };
          })
          .catch((e) => {
            console.log("Gagal memutar audio:", e);
          });
      }

      // 2. Fungsi ketika anak mengklik tombol "LANGSUNG BERMAIN"
      function klikMulaiGame() {
        // Sembunyikan popup welcome
        document.getElementById("welcomePopup").style.display = "none";

        // Hentikan suara instruksi awal jika masih berputar
        audioInstruksiAwal.pause();
        audioInstruksiAwal.currentTime = 0;

        // Aktifkan flag game dan bunyikan soal item belanjaan pertama
        gameBaruBuka = false;
        putarSuaraSoal();
      }

      function putarSuaraSoal() {
        if (soalSekarang && soalSekarang.audio) {
          let audio = new Audio(soalSekarang.audio);
          audio.play().catch((e) => console.log("Audio file belum di-upload"));
        }
      }

      // Sisa kode drag and drop, validasi, dll tetap sama...
      function dragStart(e, nominal) {
        e.dataTransfer.setData("text/plain", nominal);
      }
      function allowDrop(e) {
        e.preventDefault();
      }
      function dragEnter(e) {
        document.getElementById("dropZoneKasir").classList.add("drag-hover");
      }
      function dragLeave(e) {
        document.getElementById("dropZoneKasir").classList.remove("drag-hover");
      }

      function dropUang(e) {
        e.preventDefault();
        document.getElementById("dropZoneKasir").classList.remove("drag-hover");
        const nominalAmbil = parseInt(e.dataTransfer.getData("text/plain"));
        if (nominalAmbil) {
          prosesTambahUang(nominalAmbil);
        }
      }

      function tambahUangLewatKlik(nominal) {
        prosesTambahUang(nominal);
      }

      function prosesTambahUang(nominal) {
        arrayUangDiMeja.push(nominal);
        let audioClick = new Audio("../audio/bayar.mp3");
        audioClick.play().catch((e) => {});
        hitungTotalMeja();
      }

      function hitungTotalMeja() {
        totalUangDiMeja = arrayUangDiMeja.reduce((a, b) => a + b, 0);
        updateUIMejaKasir();
        if (totalUangDiMeja > 0) {
          document.getElementById("btnBayarSekarang").style.display = "inline-block";
        } else {
          document.getElementById("btnBayarSekarang").style.display = "none";
        }
      }

      function hapusUangIndividu(index) {
        arrayUangDiMeja.splice(index, 1);
        let audioCancel = new Audio("../audio/cling.mp3");
        audioCancel.play().catch((e) => {});
        hitungTotalMeja();
      }

      function updateUIMejaKasir() {
        const wadah = document.getElementById("wadahUangMeja");
        wadah.innerHTML = "";
        arrayUangDiMeja.forEach((nom, index) => {
          const divUang = document.createElement("div");
          divUang.className = "uang-di-meja";
          divUang.onclick = () => hapusUangIndividu(index);
          divUang.innerHTML = `<img src="${masterGambarUang[nom]}">`;
          wadah.appendChild(divUang);
        });
        document.getElementById("totalPapanTeks").innerText = "Total Uang: Rp " + totalUangDiMeja.toLocaleString("id-ID");
      }

      function validasiPembayaran() {
        if (totalUangDiMeja === soalSekarang.harga) {
          let audioBenar = new Audio("../audio/menang2.mp3");
          audioBenar.play().catch((e) => {});
          tampilkanPopUpBerhasil(`🎉 Wah, hebat! Uang kamu PAS senilai <b>Rp ${soalSekarang.harga.toLocaleString("id-ID")}</b>! Jajanan ini sekarang jadi milikmu! ✨`);
        } else {
          let audioSalah = new Audio("../audio/salah2.mp3");
          audioSalah.play().catch((e) => {});
          tampilkanPopUpGagal(`Uang Kamu Belum Pas! Total di meja: <b>Rp ${totalUangDiMeja.toLocaleString("id-ID")}</b> sedangkan harga jajanan adalah <b>Rp ${soalSekarang.harga.toLocaleString("id-ID")}</b>. Yuk sesuaikan lagi! ✨`);
        }
      }

      function tampilkanPopUpBerhasil(pesan) {
        document.getElementById("popupMessageBenar").innerHTML = pesan;
        document.getElementById("successPopup").style.display = "flex";
      }

      function tampilkanPopUpGagal(pesan) {
        document.getElementById("popupMessageSalah").innerHTML = pesan;
        document.getElementById("failedPopup").style.display = "flex";
      }

      function tutupDanUlangiSoal() {
        document.getElementById("failedPopup").style.display = "none";
      }

      function tutupDanLanjutSoal() {
        document.getElementById("successPopup").style.display = "none";
        mulaiKiosBaru();
      }

      // 🔥 UTAMA: Jalankan inisialisasi kios DAN putar instruksi awal saat DOM siap
      document.addEventListener("DOMContentLoaded", () => {
        mulaiKiosBaru();
        putarInstruksiAwalAwal();
      });

      const urutanGameMenengah = ["KiosJajanan.html", "CelenganAjaib.html", "TebakDompet.html", "MesinKasir.html", "PestaPizza.html"];

      function dapatkanIndexGameSekarang() {
        const path = window.location.pathname;
        const namaFile = path.substring(path.lastIndexOf("/") + 1);
        return urutanGameMenengah.indexOf(namaFile);
      }

      function navigasiLanjut() {
        const currentIndex = dapatkanIndexGameSekarang();
        if (currentIndex !== -1 && currentIndex < urutanGameMenengah.length - 1) {
          window.location.href = urutanGameMenengah[currentIndex + 1];
        } else {
          alert("🎉 Hebat! Kamu sudah menyelesaikan semua game di Level Menengah! Yuk kembali ke halaman utama.");
          window.location.href = "../../../games.html";
        }
      }

      function navigasiKembali() {
        const currentIndex = dapatkanIndexGameSekarang();
        if (currentIndex > 0) {
          window.location.href = urutanGameMenengah[currentIndex - 1];
        } else {
          window.location.href = "../../../games.html";
        }
      }
    </script>
  </body>
</html>
