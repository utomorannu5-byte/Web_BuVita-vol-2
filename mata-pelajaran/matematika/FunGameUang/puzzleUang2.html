<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Puzzle Uang Level 2 - BuVita EduPlay</title>
    <link rel="stylesheet" href="../../../style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />

    <style>
      body {
        background-image: radial-gradient(#333333 15%, transparent 16%);
        background-size: 16px 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        font-family: "Nunito", sans-serif;
      }

      .game-container {
        width: 100%;
        max-width: 900px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .header {
        background-color: #e67e22;
        color: white;
        padding: 20px;
        border-radius: 12px;
        border: 3px solid black;
        box-shadow: 5px 5px 0px black;
        font-family: "Fredoka One", sans-serif;
        font-size: 2rem;
        margin-bottom: 25px;
        text-align: center;
        width: 100%;
        text-transform: uppercase;
      }

      .score-board {
        font-family: "Fredoka One", sans-serif;
        font-size: 1.3rem;
        color: #f1b811;
        background: #1e1e1e;
        padding: 10px 25px;
        border-radius: 30px;
        border: 2px solid black;
        margin-bottom: 15px;
        box-shadow: 3px 3px 0px black;
      }

      /* AREA UTAMA UANG MISTERI */
      .uang-blank-canvas {
        position: relative;
        width: 540px;
        height: 240px;
        background-size: 100% 100%;
        background-repeat: no-repeat;
        border: 4px solid black;
        border-radius: 16px;
        box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.5);
        margin-bottom: 30px;
        background-color: #2c3e50;
      }

      /* KOTAK BAYANGAN TARGET (DROPZONE) */
      .target-slot {
        position: absolute;
        border: 3px dashed rgba(0, 0, 0, 0.4);
        background-color: rgba(172, 172, 172, 0.057);
        border-radius: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.3);
      }

      .target-slot.drag-over {
        background-color: rgba(46, 204, 113, 0.5);
        border-color: #2ecc71;
      }

      /* Atur Posisi Bayangan Atribut di Atas Uang Kertas */
      #slot-nominal {
        width: 130px;
        height: 50px;
        top: 20px;
        left: 20px;
      }
      #slot-pahlawan {
        width: 140px;
        height: 160px;
        top: 40px;
        left: 200px;
        border-radius: 50%;
      }
      #slot-budaya {
        width: 120px;
        height: 140px;
        top: 50px;
        right: 20px;
      }

      /* Gambar Atribut yang Sudah Sukses Ditempel */
      .fitted-img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        border-radius: inherit;
      }

      /* KONTEN BAWAH: ATRIBUT YANG HARUS DI-DRAG */
      .attr-pool-container {
        display: flex;
        justify-content: center;
        gap: 25px;
        width: 100%;
        padding: 25px;
        background-color: #1e1e1e;
        border-radius: 15px;
        border: 3px solid black;
        min-height: 180px;
        align-items: center;
        box-shadow: 5px 5px 0px black;
      }

      .attr-card {
        width: 130px;
        height: 130px;
        background-color: #34495e;
        border: 3px solid black;
        border-radius: 12px;
        padding: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: grab;
        box-shadow: 4px 4px 0px black;
        transition: transform 0.2s;
      }

      .attr-card:active {
        cursor: grabbing;
        transform: scale(1.05);
      }

      .attr-card img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }

      /* POPUP GLOBAL */
      .popup-overlay-global {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        z-index: 9999;
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(5px);
      }

      .popup-content-box {
        background-color: #1e1e1e;
        border: 4px solid #e67e22;
        border-radius: 24px;
        padding: 40px;
        text-align: center;
        max-width: 450px;
        width: 90%;
        box-shadow: 0px 0px 30px rgba(230, 126, 34, 0.3);
      }

      .popup-title {
        font-family: "Fredoka One", sans-serif;
        color: #e67e22;
        font-size: 2.2rem;
        margin-bottom: 15px;
      }

      .popup-text {
        color: white;
        font-size: 1.2rem;
        margin-bottom: 30px;
      }

      .popup-btn-next {
        background-color: #f1b811;
        color: black;
        font-family: "Fredoka One", sans-serif;
        padding: 15px 30px;
        font-size: 1.3rem;
        border: 3px solid black;
        border-radius: 15px;
        box-shadow: 5px 5px 0px black;
        cursor: pointer;
        width: 100%;
        margin-bottom: 10px;
      }

      .btn-next-level {
        background-color: #2ecc71;
        color: white;
        font-family: "Fredoka One", sans-serif;
        font-size: 1.4rem;
        padding: 15px 40px;
        border: 3px solid black;
        border-radius: 12px;
        cursor: pointer;
        box-shadow: 4px 4px 0px black;
        margin-top: 25px;
        display: none;
      }
    </style>
  </head>
  <body>
    <header class="main-header" style="width: 100%">
      <div class="logo-area">
        <img src="../../../assets/LogoFull.png" class="logo-icon" alt="BuVita Logo" />
        <span class="logo-text"><span class="text-white">BuVita</span> <span class="text-yellow">EduPlay</span></span>
      </div>
    </header>

    <div class="game-container">
      <div class="header">🎨 LEVEL 2: PASANG ATRIBUT UANG</div>

      <div class="score-board" id="progressText">Tantangan: 0 / 0</div>

      <!-- KANVAS UANG POLOS DENGAN SLOT PEMASANGAN -->
      <div class="uang-blank-canvas" id="canvasUang">
        <div class="target-slot" id="slot-nominal" data-type="nominal"></div>
        <div class="target-slot" id="slot-pahlawan" data-type="pahlawan"></div>
        <div class="target-slot" id="slot-budaya" data-type="budaya"></div>
      </div>

      <!-- WADAH PILIHAN ATRIBUT YANG AKAN DI-DRAG -->
      <div class="attr-pool-container" id="attrPool"></div>

      <button class="btn-next-level" id="nextLevelBtn" onclick="lanjutKeLevelTiga()">LEVEL 3: PILAH COIN CELENGAN ➡️</button>

      <!-- WELCOME POPUP -->
      <div id="welcomePopup" class="popup-overlay-global" style="display: flex">
        <div class="popup-content-box">
          <div style="font-size: 4rem; margin-bottom: 10px">🕵️‍♂️</div>
          <h2 class="popup-title">Lengkapi Uang Misteri!</h2>
          <p class="popup-text">Uang kertas ini kehilangan atributnya! Yuk pasang kembali Gambar Pahlawan, Angka Nominal, dan Gambar Budaya pada tempat yang pas!</p>
          <button class="popup-btn-next" style="background-color: #e67e22; color: white" onclick="dengarPetunjukAwal()">🔊 DENGAR PETUNJUK</button>
          <button class="popup-btn-next" style="background-color: #2ecc71; color: white; border-color: #27ae60" onclick="mulaiGame()">MAIN SEKARANG ➡️</button>
        </div>
      </div>

      <!-- POPUP SUKSES -->
      <div id="successPopup" class="popup-overlay-global">
        <div class="popup-content-box" style="border-color: #2ecc71; box-shadow: 0px 0px 30px rgba(46, 204, 113, 0.3)">
          <div style="font-size: 5rem; margin-bottom: 20px">🎉</div>
          <h2 class="popup-title" style="color: #2ecc71" id="successTitle">LUAR BIASA!</h2>
          <p class="popup-text" id="successMessage"></p>
          <button class="popup-btn-next" style="background-color: #f1b811" id="actionPopupBtn" onclick="lanjutSoalBerikutnya()">SOAL BERIKUTNYA</button>
        </div>
      </div>
    </div>

    <script>
      let audioMisi = null;
      let audioInstruksiAwal = new Audio("../audio/instruksi_puzzle2.mp3");
      let totalAtributSukses = 0;
      let draggedAttrId = null;

      let indeksSoalSekarang = 0;
      let bankUangLevel2 = [];

      // BANK DATA LEVEL 2: Jalur gambar uang polos + aset pecahan kecilnya
      // Sesuaikan path gambar asset-nya dengan folder lokasimu ma bro!
      const datasetUangMisteri = [
        {
          teks: "Seribu Rupiah",
          bgPolos: "../assets/uang1000.png",
          audio: "../audio/1000.mp3",
          atribut: [
            { type: "nominal", img: "../assets/1atrUang1000.png" },
            { type: "pahlawan", img: "../assets/2atrUang1000.png" },
            { type: "budaya", img: "../assets/3atrUang1000.png" },
          ],
        },
        {
          teks: "Dua Ribu Rupiah",
          bgPolos: "../assets/uang2000.png",
          audio: "../audio/2000.mp3",
          atribut: [
            { type: "nominal", img: "../../../assets/attr_2rb_nom.png" },
            { type: "pahlawan", img: "../../../assets/attr_2rb_pahlawan.png" },
            { type: "budaya", img: "../../../assets/attr_2rb_budaya.png" },
          ],
        },
        {
          teks: "Lima Puluh Ribu Rupiah",
          bgPolos: "../assets/uang50000.png",
          audio: "../audio/50000.mp3",
          atribut: [
            { type: "nominal", img: "../../../assets/attr_50rb_nom.png" },
            { type: "pahlawan", img: "../../../assets/attr_50rb_pahlawan.png" },
            { type: "budaya", img: "../../../assets/attr_50rb_budaya.png" },
          ],
        },
        {
          teks: "Seratus Ribu Rupiah",
          bgPolos: "../assets/uang100000.png",
          audio: "../audio/100000.mp3",
          atribut: [
            { type: "nominal", img: "../../../assets/attr_100rb_nom.png" },
            { type: "pahlawan", img: "../../../assets/attr_100rb_pahlawan.png" },
            { type: "budaya", img: "../../../assets/attr_100rb_budaya.png" },
          ],
        },
        // Bisa kamu tambahkan pecahan 5rb, 10rb, dan 20rb sesuai kebutuhan
      ];

      function shuffleArray(array) {
        return array.sort(() => Math.random() - 0.5);
      }

      function playSuara(path) {
        if (audioMisi) {
          audioMisi.pause();
          audioMisi.currentTime = 0;
        }
        audioMisi = new Audio(path);
        audioMisi.play().catch((e) => console.log("Audio diblokir browser"));
      }

      function dengarPetunjukAwal() {
        audioInstruksiAwal.play().catch((e) => console.log("Interaksi user diperlukan"));
      }

      function mulaiGame() {
        document.getElementById("welcomePopup").style.display = "none";
        audioInstruksiAwal.pause();
        audioInstruksiAwal.currentTime = 0;

        bankUangLevel2 = shuffleArray([...datasetUangMisteri]);
        indeksSoalSekarang = 0;

        muatSoalAtributUang();
      }

      function muatSoalAtributUang() {
        totalAtributSukses = 0;
        const soalAktif = bankUangLevel2[indeksSoalSekarang];

        document.getElementById("progressText").innerText = `Uang Ke: ${indeksSoalSekarang + 1} / ${bankUangLevel2.length}`;
        document.getElementById("nextLevelBtn").style.display = "none";

        // Pasang Background Uang Kosong
        document.getElementById("canvasUang").style.backgroundImage = `url('${soalAktif.bgPolos}')`;

        // Reset Slot Bayangan (Dropzone)
        const slots = document.querySelectorAll(".target-slot");
        slots.forEach((slot) => {
          slot.innerHTML = "";
          slot.addEventListener("dragover", (e) => e.preventDefault());
          slot.addEventListener("dragenter", (e) => e.currentTarget.classList.add("drag-over"));
          slot.addEventListener("dragleave", (e) => e.currentTarget.classList.remove("drag-over"));
          slot.addEventListener("drop", handleDropAtribut);
        });

        // Tampilkan Atribut di Pool bawah secara acak
        const pool = document.getElementById("attrPool");
        pool.innerHTML = "";

        const atributAcak = shuffleArray([...soalAktif.atribut]);
        atributAcak.forEach((attr, idx) => {
          const card = document.createElement("div");
          card.className = "attr-card";
          card.id = `attr-${attr.type}`;
          card.draggable = true;
          card.dataset.type = attr.type;
          card.innerHTML = `<img src="${attr.img}" alt="Atribut">`;

          card.addEventListener("dragstart", (e) => {
            draggedAttrId = e.currentTarget.id;
          });

          pool.appendChild(card);
        });

        // Suarakan nominal misi kuis aktif
        if (soalAktif.audio) {
          playSuara(soalAktif.audio);
        }
      }

      function handleDropAtribut(e) {
        e.preventDefault();
        const slot = e.currentTarget;
        slot.classList.remove("drag-over");

        if (slot.children.length > 0) return;

        const card = document.getElementById(draggedAttrId);
        const slotType = slot.getAttribute("data-type");
        const cardType = card.getAttribute("data-type");

        // Validasi kecocokan jenis atribut (misal pahlawan ketemu slot pahlawan)
        if (slotType === cardType) {
          const imgInside = card.querySelector("img").cloneNode(true);
          imgInside.className = "fitted-img";
          slot.appendChild(imgInside);

          card.remove(); // Hilangkan dari kotak pilihan bawah
          playSuara("../audio/bayar.mp3");
          totalAtributSukses++;

          // Jika ketiga atribut (Nominal, Pahlawan, Budaya) sudah terpasang semua
          if (totalAtributSukses === 3) {
            setTimeout(() => {
              evaluasiSelesaiSoal();
            }, 600);
          }
        } else {
          playSuara("../audio/salah2.mp3");
        }
      }

      function evaluasiSelesaiSoal() {
        const soalAktif = bankUangLevel2[indeksSoalSekarang];
        playSuara("../audio/menang2.mp3");

        if (indeksSoalSekarang === bankUangLevel2.length - 1) {
          document.getElementById("successTitle").innerText = "🎉 FANTASTIS!";
          document.getElementById("successMessage").innerHTML = `Hebat! Kamu berhasil melengkapi seluruh atribut detail uang misteri Nusantara!`;
          document.getElementById("actionPopupBtn").innerText = "LANJUT KE LEVEL 3";
          document.getElementById("actionPopupBtn").setAttribute("onclick", "lanjutKeLevelTiga()");
        } else {
          document.getElementById("successTitle").innerText = "✨ BERHASIL!";
          document.getElementById("successMessage").innerHTML = `Keren! Uang **${soalAktif.teks}** sekarang sudah lengkap ciri-cirinya!`;
          document.getElementById("actionPopupBtn").innerText = "SOAL BERIKUTNYA ➡️";
          document.getElementById("actionPopupBtn").setAttribute("onclick", "lanjutSoalBerikutnya()");
        }

        document.getElementById("successPopup").style.display = "flex";
      }

      function lanjutSoalBerikutnya() {
        document.getElementById("successPopup").style.display = "none";
        indeksSoalSekarang++;
        muatSoalAtributUang();
      }

      function lanjutKeLevelTiga() {
        window.location.href = "puzzle-level3.html";
      }
    </script>
  </body>
</html>
