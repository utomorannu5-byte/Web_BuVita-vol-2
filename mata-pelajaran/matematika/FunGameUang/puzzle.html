<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matematika Lanjutan: Puzzle Uang - BuVita EduPlay</title>
    <link rel="stylesheet" href="../../../style.css" />
    <style>
      body {
        background-color: #15141c;
        background-image: radial-gradient(#2c2a3a 15%, transparent 16%);
        background-size: 20px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .game-container {
        width: 100%;
        max-width: 950px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .puzzle-header {
        background: linear-gradient(135deg, #3498db, #2980b9);
        color: white;
        padding: 15px 35px;
        border-radius: 20px;
        border: 4px solid black;
        box-shadow: 6px 6px 0px black;
        font-family: "Fredoka One", sans-serif;
        font-size: 1.8rem;
        margin-bottom: 20px;
        text-align: center;
        width: 100%;
        cursor: pointer;
      }

      /* LAYOUT UTAMA PUZZLE */
      .puzzle-grid {
        display: grid;
        grid-template-columns: 1fr 1.2fr;
        gap: 30px;
        width: 100%;
        margin-bottom: 25px;
      }
      @media (max-width: 768px) {
        .puzzle-grid {
          grid-template-columns: 1fr;
        }
      }

      .board-card {
        background-color: #201f2b;
        border: 4px solid black;
        border-radius: 24px;
        padding: 20px;
        box-shadow: 6px 6px 0px black;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* Area Siluet / Bayangan Koin Puzzle */
      .shadow-zone {
        background-color: #111016;
        border: 3px dashed #3498db;
        border-radius: 20px;
        width: 100%;
        min-height: 180px;
        display: flex;
        gap: 15px;
        justify-content: center;
        align-items: center;
        padding: 15px;
        margin-top: 15px;
      }
      .slot-siluet {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background-color: #2c2a3a;
        border: 3px solid #15141c;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Fredoka One", sans-serif;
        color: #47445a;
        font-size: 1.1rem;
        box-shadow: inset 0px 5px 10px rgba(0, 0, 0, 0.5);
      }
      .slot-siluet.terisi {
        background-color: transparent;
        border: none;
        box-shadow: none;
      }

      /* Tempat Kepingan Puzzle yang Bisa Diklik */
      .pieces-zone {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 15px;
      }
      .kepingan-uang {
        width: 95px;
        height: 95px;
        cursor: pointer;
        transition: transform 0.2s;
        animation: floating 2s ease-in-out infinite alternate;
      }
      .kepingan-uang:hover {
        transform: scale(1.1) rotate(5deg);
      }
      .kepingan-uang img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .target-barang-box {
        text-align: center;
        font-family: "Fredoka One", sans-serif;
        color: white;
      }

      @keyframes floating {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-6px);
        }
      }

      /* Pop-up Global */
      .popup-overlay-global {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        z-index: 9999;
        justify-content: center;
        align-items: center;
      }
      .popup-content-box {
        background-color: #201f2b;
        border: 4px solid #2ecc71;
        border-radius: 24px;
        padding: 40px;
        text-align: center;
        max-width: 450px;
        width: 90%;
      }
      .popup-icon-circle {
        font-size: 5rem;
        margin-bottom: 20px;
      }
      .popup-title {
        font-family: "Fredoka One", sans-serif;
        color: #2ecc71;
        font-size: 2.5rem;
        margin-bottom: 10px;
      }
      .popup-text {
        font-family: "Nunito", sans-serif;
        color: white;
        font-size: 1.2rem;
        margin-bottom: 30px;
      }
      .popup-btn-next {
        background-color: #f1b811;
        color: black;
        font-family: "Fredoka One", sans-serif;
        padding: 15px 30px;
        font-size: 1.3rem;
        border: 3px solid black;
        border-radius: 15px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header class="main-header" style="width: 100%">
      <div class="logo-area">
        <img src="../../../assets/LogoFull.png" class="logo-icon" alt="BuVita Logo" />
        <span class="logo-text"><span class="text-white">BuVita</span> <span class="text-yellow">EduPlay</span></span>
      </div>
    </header>

    <div class="game-container">
      <div class="puzzle-header" onclick="putarSuaraSoal()">🧩 Puzzle Pasang Uang Belanja 🔊</div>

      <div class="puzzle-grid">
        <div class="board-card">
          <div class="target-barang-box">
            <span id="itemEmoji" style="font-size: 5rem">🍦</span>
            <h3 id="itemName" style="margin: 5px 0">Es Krim Lezat</h3>
            <span style="background-color: #e74c3c; padding: 5px 15px; border-radius: 10px; border: 2px solid black; display: inline-block; margin-top: 5px" id="itemHarga">Rp 3.000</span>
          </div>
          <p style="font-size: 0.85rem; color: #aaa; font-family: &quot;Nunito&quot;; margin-top: 15px">Pasang uang yang cocok ke bayangannya:</p>
          <div class="shadow-zone" id="zonaSiluet"></div>
        </div>

        <div class="board-card" style="border-color: #3498db">
          <h4 style="font-family: &quot;Fredoka One&quot;; color: white; margin-bottom: 10px">🧩 Kepingan Puzzle Uang:</h4>
          <p style="font-size: 0.8rem; color: #888; font-family: &quot;Nunito&quot;; text-align: center">Klik kepingan uang di bawah untuk memasangkannya ke siluet!</p>
          <div class="pieces-zone" id="zonaKepingan"></div>
        </div>
      </div>

      <div class="navigasi-level-box">
        <button class="btn-nav-level btn-back" onclick="window.location.href = 'UangSakuCukup.html'">⬅️ KEMBALI</button>
        <button class="btn-nav-level btn-next" onclick="window.location.href = 'UangRunner.html'">GAME RUNNER ➡️</button>
      </div>

      <div id="successPopup" class="popup-overlay-global">
        <div class="popup-content-box">
          <div class="popup-icon-circle">🧩</div>
          <h2 class="popup-title">PAS DAN COCOK!</h2>
          <p id="popupMessage" class="popup-text"></p>
          <button class="popup-btn-next" onclick="tutupDanLanjutSoal()">PUZZLE BERIKUTNYA ✨</button>
        </div>
      </div>
    </div>

    <script>
      const masterUang = {
        1000: "../assets/koin1000.png", // disarankan koin bulat untuk kecocokan siluet puzzle
        2000: "../assets/uang2000.png",
      };

      const daftarSoal = [
        { nama: "Es Krim Cone", emoji: "🍦", harga: 3000, susunan: [2000, 1000], audio: "../../../audio/puzzle_eskrim.mp3" },
        { nama: "Permen Lollipop", emoji: "🍭", harga: 2000, susunan: [1000, 1000], audio: "../../../audio/puzzle_permen.mp3" },
      ];

      let soalAktif = null;
      let slotTerisi = 0;

      function mulaiPuzzle() {
        slotTerisi = 0;
        const acak = Math.floor(Math.random() * daftarSoal.length);
        soalAktif = daftarSoal[acak];

        document.getElementById("itemEmoji").innerText = soalAktif.emoji;
        document.getElementById("itemName").innerText = soalAktif.nama;
        document.getElementById("itemHarga").innerText = "Rp " + soalAktif.harga.toLocaleString("id-ID");

        // Buat Siluet Kosong
        const zonaSiluet = document.getElementById("zonaSiluet");
        zonaSiluet.innerHTML = "";
        soalAktif.susunan.forEach((nominal, idx) => {
          const slot = document.createElement("div");
          slot.className = "slot-siluet";
          slot.id = `siluet-${idx}`;
          slot.innerText = `Rp ${nominal.toLocaleString("id-ID")}`;
          zonaSiluet.appendChild(slot);
        });

        // Buat Kepingan Pilihan Acak (ditambah kepingan pengecoh)
        const zonaKepingan = document.getElementById("zonaKepingan");
        zonaKepingan.innerHTML = "";
        let kepinganPilihan = [...soalAktif.susunan, 1000].sort(() => Math.random() - 0.5);

        kepinganPilihan.forEach((nominal) => {
          const keping = document.createElement("div");
          keping.className = "kepingan-uang";
          keping.innerHTML = `<img src="${masterUang[nominal] || masterUang[1000]}">`;
          keping.onclick = () => pasangKepingan(nominal, keping);
          zonaKepingan.appendChild(keping);
        });
      }

      function pasangKepingan(nominal, elemenKeping) {
        // Cari slot siluet yang cocok dan belum terisi
        for (let i = 0; i < soalAktif.susunan.length; i++) {
          const slot = document.getElementById(`siluet-${i}`);
          if (soalAktif.susunan[i] === nominal && !slot.classList.contains("terisi")) {
            slot.classList.add("terisi");
            slot.innerHTML = `<img src="${elemenKeping.querySelector("img").src}" style="width:100%; height:100%; object-fit:contain;">`;
            elemenKeping.style.visibility = "hidden"; // hilangkan dari pilihan
            slotTerisi++;
            new Audio("../../../audio/benar.mp3").play().catch(() => {});

            if (slotTerisi === soalAktif.susunan.length) {
              setTimeout(() => {
                new Audio("../../../audio/menang.mp3").play().catch(() => {});
                document.getElementById("popupMessage").innerHTML = `🎉 Selamat! Kamu berhasil menyusun puzzle uang senilai <b>Rp ${soalAktif.harga.toLocaleString("id-ID")}</b> dengan sangat rapi!`;
                document.getElementById("successPopup").style.display = "flex";
              }, 400);
            }
            return;
          }
        }
        // Jika salah klik uang yang tidak cocok
        new Audio("../../../audio/salah.mp3").play().catch(() => {});
      }

      function tutupDanLanjutSoal() {
        document.getElementById("successPopup").style.display = "none";
        mulaiPuzzle();
      }

      document.addEventListener("DOMContentLoaded", mulaiPuzzle);
    </script>
  </body>
</html>
