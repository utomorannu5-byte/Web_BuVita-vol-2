<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BuVita EduPlay - Katalog Games</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <header class="main-header">
      <div class="logo-area">
        <img src="assets/LogoFull.png" class="logo-icon" alt="BuVita Logo" />
        <span class="logo-text"><span class="text-white">BuVita</span> <span class="text-yellow">EduPlay</span></span>
      </div>
      <nav class="nav-menu">
        <a href="index.html" class="nav-item">HOME</a>
        <a href="games.html" class="nav-item active">GAMES</a>
        <a href="kategori.html" class="nav-item">KATEGORI</a>
        <a href="aboutUs.html" class="nav-item">TENTANG KAMI</a>
      </nav>
      <div class="header-actions">
        <button class="action-btn">🔍</button>
        <button class="action-btn">🌐</button>
      </div>
    </header>

    <section class="catalog-section catalog-section--tall">
      <h2 class="catalog-title">🎯 Pilih Bidang Studimu</h2>
      <p class="catalog-subtitle">Ayo pilih petualangan ilmu yang ingin kamu jelajahi hari ini!</p>

      <div class="subject-filter-container">
        <button class="filter-card active" onclick="switchSubject('matematika', this)">
          <div class="filter-icon bg-yellow">🔢</div>
          <h3>Matematika</h3>
        </button>
        <button class="filter-card" onclick="switchSubject('bahasa', this)">
          <div class="filter-icon bg-pink">🔤</div>
          <h3>Bahasa</h3>
        </button>
        <button class="filter-card" onclick="switchSubject('umum', this)">
          <div class="filter-icon bg-purple">🗺️</div>
          <h3>Pengetahuan Umum</h3>
        </button>
        <button class="filter-card" onclick="switchSubject('ipa', this)">
          <div class="filter-icon bg-red">🧪</div>
          <h3>IPA</h3>
        </button>
        <button class="filter-card" onclick="switchSubject('seni', this)">
          <div class="filter-icon bg-blue">🎨</div>
          <h3>Seni Budaya</h3>
        </button>
      </div>

      <div id="gamesDisplayArea" class="games-grid-layout"></div>
    </section>

    <footer class="main-footer">
      <div class="footer-content">
        <div class="footer-logo">BuVita <span class="text-yellow">EduPlay</span></div>
        <p class="footer-text">Media pembelajaran game interaktif dan inklusif untuk anak berkebutuhan khusus.</p>
        <div class="footer-divider"></div>
        <p class="footer-copyright">© 2026 BuVita EduPlay. Made with 💛 for Special Education.</p>
      </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/catalog.js"></script>
  </body>
</html>
